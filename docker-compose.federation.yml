networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # backend network has no external routing

secrets:
  db_password:
    # File-backed secret. Generated by `./scripts/bootstrap.sh` on first run.
    # Using `external: true` would require Swarm mode + a manual
    # `docker secret create` step; file-backed lets a fresh self-hoster
    # run `docker compose -f docker-compose.federation.yml up` directly.
    file: ./secrets/db_password

services:
  node1-db:
    image: postgres:16
    container_name: olympus-node1-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olympus}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-olympus}
    secrets:
      - db_password
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olympus} -d ${POSTGRES_DB:-olympus}"]
    networks:
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  node2-db:
    image: postgres:16
    container_name: olympus-node2-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olympus}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-olympus}
    secrets:
      - db_password
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olympus} -d ${POSTGRES_DB:-olympus}"]
    networks:
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  node3-db:
    image: postgres:16
    container_name: olympus-node3-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olympus}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-olympus}
    secrets:
      - db_password
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olympus} -d ${POSTGRES_DB:-olympus}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - olympus_node3_pgdata:/var/lib/postgresql/data
    networks:
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  node1-app:
    build:
      context: .
      target: production
    container_name: olympus-node1-app
    env_file:
      - .env
    command:
      - /bin/sh
      - -c
      - >
        echo "Waiting for database..." &&
        sleep 2 &&
        exec uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      # Construct URL at runtime from components, not as a single credential-bearing string
      DATABASE_HOST: node1-db
      DATABASE_NAME: ${POSTGRES_DB:-olympus}
      DATABASE_USER: ${POSTGRES_USER:-olympus}
      DATABASE_PASSWORD_FILE: /run/secrets/db_password
      # Dev-only signing key generation (do not use in production)
      OLYMPUS_DEV_SIGNING_KEY: "true"
      OLYMPUS_API_KEYS_JSON: ${OLYMPUS_API_KEYS_JSON:?OLYMPUS_API_KEYS_JSON must be set}
    secrets:
      - db_password
    depends_on:
      node1-db:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - frontend
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run

  node2-app:
    build:
      context: .
      target: production
    container_name: olympus-node2-app
    env_file:
      - .env
    command:
      - /bin/sh
      - -c
      - >
        echo "Waiting for database..." &&
        sleep 2 &&
        exec uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      # Construct URL at runtime from components, not as a single credential-bearing string
      DATABASE_HOST: node2-db
      DATABASE_NAME: ${POSTGRES_DB:-olympus}
      DATABASE_USER: ${POSTGRES_USER:-olympus}
      DATABASE_PASSWORD_FILE: /run/secrets/db_password
      # Dev-only signing key generation (do not use in production)
      OLYMPUS_DEV_SIGNING_KEY: "true"
      OLYMPUS_API_KEYS_JSON: ${OLYMPUS_API_KEYS_JSON:?OLYMPUS_API_KEYS_JSON must be set}
    secrets:
      - db_password
    depends_on:
      node2-db:
        condition: service_healthy
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - frontend
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run

  node3-app:
    build:
      context: .
      target: production
    container_name: olympus-node3-app
    env_file:
      - .env
    command:
      - /bin/sh
      - -c
      - >
        echo "Waiting for database..." &&
        sleep 2 &&
        exec uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      # Construct URL at runtime from components, not as a single credential-bearing string
      DATABASE_HOST: node3-db
      DATABASE_NAME: ${POSTGRES_DB:-olympus}
      DATABASE_USER: ${POSTGRES_USER:-olympus}
      DATABASE_PASSWORD_FILE: /run/secrets/db_password
      # Dev-only signing key generation (do not use in production)
      OLYMPUS_DEV_SIGNING_KEY: "true"
      OLYMPUS_API_KEYS_JSON: ${OLYMPUS_API_KEYS_JSON:?OLYMPUS_API_KEYS_JSON must be set}
    secrets:
      - db_password
    depends_on:
      node3-db:
        condition: service_healthy
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - frontend
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run

  federation-ui:
    build:
      context: .
      target: production
    container_name: olympus-federation-ui
    command: ["uvicorn", "ui.app:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      OLYMPUS_DEBUG_UI: "true"
      UI_API_BASE: http://node1-app:8000
      OLYMPUS_FEDERATION_NODES: >-
        {"node1":"http://node1-app:8000","node2":"http://node2-app:8000","node3":"http://node3-app:8000"}
    depends_on:
      node1-app:
        condition: service_healthy
      node2-app:
        condition: service_healthy
      node3-app:
        condition: service_healthy
    ports:
      - "8081:8080"
    networks:
      - frontend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

volumes:
  olympus_node1_pgdata:
  olympus_node2_pgdata:
  olympus_node3_pgdata:
