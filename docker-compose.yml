# Docker Compose configuration for Olympus development environment
# Provides PostgreSQL 16 database for local development and testing
#
# SECURITY NOTE: This configuration uses default credentials (olympus/olympus)
# for LOCAL DEVELOPMENT ONLY. For production deployments:
# - Use environment variables or Docker secrets for credentials
# - Never commit production credentials to version control
# - Consider using a .env file (add to .gitignore) for local overrides

services:
  db:
    image: postgres:16
    container_name: olympus-postgres
    environment:
      # Default credentials for local development only
      POSTGRES_USER: ${POSTGRES_USER:-olympus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olympus}
      POSTGRES_DB: ${POSTGRES_DB:-olympus}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olympus} -d ${POSTGRES_DB:-olympus}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - olympus_pgdata:/var/lib/postgresql/data

  # Optional: Application service (use `docker compose up -d app` to run full stack)
  app:
    build:
      context: .
      target: production
    container_name: olympus-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-olympus}:${POSTGRES_PASSWORD:-olympus}@db:5432/${POSTGRES_DB:-olympus}
    depends_on:
      db:
        condition: service_healthy

volumes:
  olympus_pgdata:
