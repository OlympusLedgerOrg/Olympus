# Docker Compose configuration for Olympus development environment
# Provides PostgreSQL 16 database for local development and testing
#
# SETUP: Copy .env.example to .env and adjust values before running.
# The .env file supplies all credentials and is excluded from version control.
# For production deployments, use Docker secrets or a secrets manager.
 
services:
  db:
    image: postgres:16
    container_name: olympus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - olympus_pgdata:/var/lib/postgresql/data

  # Optional: Application service (use `docker compose up -d app` to run full stack)
  app:
    build:
      context: .
      target: production
    container_name: olympus-api
    command:
      - /bin/sh
      - -c
      - >
        python -c "import os; from storage.postgres import StorageLayer; StorageLayer(os.environ['DATABASE_URL']).init_schema()"
        && exec uvicorn api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OLYMPUS_DEV_SIGNING_KEY: ${OLYMPUS_DEV_SIGNING_KEY}
      OLYMPUS_API_KEYS_JSON: ${OLYMPUS_API_KEYS_JSON}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  ui:
    build:
      context: .
      target: production
    container_name: olympus-ui
    command: ["uvicorn", "ui.app:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      UI_API_BASE: ${UI_API_BASE}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  olympus_pgdata:
