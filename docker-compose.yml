# Docker Compose configuration for Olympus development environment
# Provides PostgreSQL 16 database for local development and testing
#
# SETUP: Copy .env.example to .env and adjust values before running.
# The .env file supplies all credentials and is excluded from version control.
# For production deployments, use Docker secrets or a secrets manager.

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # backend network has no external routing

secrets:
  db_password:
    external: true  # created with: docker secret create db_password -

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - frontend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.25"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  db:
    image: postgres:16
    container_name: olympus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - db_password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - olympus_pgdata:/var/lib/postgresql/data
    networks:
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  # Optional: Application service (use `docker compose up -d app` to run full stack)
  app:
    build:
      context: .
      target: production
    container_name: olympus-api
    env_file:
      - .env
    command: ["/bin/sh", "/app/scripts/startup.sh"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${OLYMPUS_DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.api-http.middlewares=redirect-to-https"
    environment:
      # Construct URL at runtime from components, not as a single credential-bearing string
      DATABASE_HOST: db
      DATABASE_NAME: ${DATABASE_NAME:?DATABASE_NAME must be set}
      DATABASE_USER: ${DATABASE_USER:?DATABASE_USER must be set}
      DATABASE_PASSWORD_FILE: /run/secrets/db_password
      OLYMPUS_DEV_SIGNING_KEY: ${OLYMPUS_DEV_SIGNING_KEY:-true}
      OLYMPUS_API_KEYS_JSON: '${OLYMPUS_API_KEYS_JSON:-[]}'
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5
    networks:
      - frontend
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run

  ui:
    build:
      context: .
      target: production
    container_name: olympus-ui
    env_file:
      - .env
    command: ["uvicorn", "ui.app:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      UI_API_BASE: ${UI_API_BASE}
      PSYCOPG_URL: ${PSYCOPG_URL:?Set PSYCOPG_URL in .env}
      OLYMPUS_DEBUG_UI: ${OLYMPUS_DEBUG_UI:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ORACLE_RATE_LIMIT_REQUESTS: ${ORACLE_RATE_LIMIT_REQUESTS:-10}
      ORACLE_RATE_LIMIT_WINDOW_SECONDS: ${ORACLE_RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - frontend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

volumes:
  olympus_pgdata:
  letsencrypt:
