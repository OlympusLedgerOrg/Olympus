# Docker Compose configuration for Olympus development environment
# Provides PostgreSQL 16 database for local development and testing
#
# SETUP: Copy .env.example to .env and adjust values before running.
# The .env file supplies all credentials and is excluded from version control.
# For production deployments, use Docker secrets or a secrets manager.
#
# PROFILES:
#   - default: db, app, ui, traefik
#   - sequencer: adds cdhs-smf-rust and sequencer-go services for Go sequencer write path
#
# To run with Go sequencer: docker compose --profile sequencer up -d

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # backend network has no external routing

secrets:
  db_password:
    # File-backed secret. Generated by `./scripts/bootstrap.sh` on first run.
    # Using a file (instead of `external: true`) means a fresh `docker compose
    # up` does not crash with "Secret db_password not found" — the only way
    # `external` works is `docker secret create`, which requires Swarm mode
    # and is a notorious sharp edge for self-hosters.
    file: ./secrets/db_password

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - frontend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.25"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  db:
    image: postgres:16
    container_name: olympus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olympus}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-olympus}
    secrets:
      - db_password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olympus} -d ${POSTGRES_DB:-olympus}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - olympus_pgdata:/var/lib/postgresql/data
    networks:
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Go Sequencer Write Path (optional, use --profile sequencer)
  # ---------------------------------------------------------------------------

  # Rust CD-HS-ST service: Maintains the global 256-level Sparse Merkle Tree.
  # Exposes gRPC over Unix socket at /run/olympus/cdhs-smf.sock.
  # All Merkle operations (Update, ProveInclusion, GetRoot, Sign) are delegated here.
  cdhs-smf-rust:
    profiles: [sequencer]
    build:
      context: services/cdhs-smf-rust
      dockerfile: Dockerfile
    container_name: olympus-cdhs-smf-rust
    volumes:
      - olympus-socket:/run/olympus
    environment:
      CDHS_SMF_SOCKET: /run/olympus/cdhs-smf.sock
      # Ed25519 signing key for SMT roots (hex-encoded 32-byte seed).
      # Uses the same key as Python ingest for consistent signatures.
      # Override with OLYMPUS_SEQUENCER_SIGNING_KEY if separate key is needed.
      #
      # SECURITY: providing the key inline via SEQUENCER_SMT_SIGNING_KEY is
      # DEPRECATED — env vars are visible via /proc/<pid>/environ.  Prefer
      # mounting a 0600 file and pointing SEQUENCER_SMT_SIGNING_KEY_PATH at
      # it (e.g. via a Docker/K8s secret).  The service will emit a startup
      # warning whenever the env-var fallback is used.
      SEQUENCER_SMT_SIGNING_KEY: ${OLYMPUS_SEQUENCER_SIGNING_KEY:-${OLYMPUS_INGEST_SIGNING_KEY}}
      RUST_LOG: ${RUST_LOG:-info}
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true

  # Go sequencer: Trillian-shaped log service that calls the Rust CD-HS-ST service.
  # Exposes HTTP API on port 8081 for QueueLeaf, QueueLeaves, GetLatestRoot,
  # GetInclusionProof, GetSignedRootPair (formerly GetConsistencyProof — see
  # services/sequencer-go/README.md and CHANGELOG.md for the rename rationale).
  sequencer-go:
    profiles: [sequencer]
    build:
      context: services/sequencer-go
      dockerfile: Dockerfile
    container_name: olympus-sequencer-go
    depends_on:
      cdhs-smf-rust:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      CDHS_SMF_SOCKET: /run/olympus/cdhs-smf.sock
      # DB connection: built at startup from these components plus the
      # password loaded from /run/secrets/db_password (mounted below).
      # This mirrors the `app` service's secret handling so neither service
      # leaks the DB password into its process environment.
      SEQUENCER_DB_HOST: db
      SEQUENCER_DB_PORT: "5432"
      SEQUENCER_DB_USER: ${POSTGRES_USER:-olympus}
      SEQUENCER_DB_NAME: ${POSTGRES_DB:-olympus}
      # Must match storage.NewPostgresStorage, which only accepts
      # verify-full or verify-ca. Do not default to `disable` here, or
      # sequencer-go will exit immediately during DB initialization with
      # "sslmode=disable is not permitted for the cryptographic state DB".
      # Operators can override via SEQUENCER_DB_SSLMODE when running
      # against a TLS-terminated proxy or test fixture.
      SEQUENCER_DB_SSLMODE: ${SEQUENCER_DB_SSLMODE:-verify-full}
      SEQUENCER_DB_PASSWORD_FILE: /run/secrets/db_password
      SEQUENCER_API_TOKEN: ${OLYMPUS_SEQUENCER_TOKEN}
      SEQUENCER_HTTP_ADDR: ":8081"
      # Maximum batch size for /v1/queue-leaves (default: 1000)
      OLYMPUS_SEQUENCER_MAX_BATCH_SIZE: ${OLYMPUS_SEQUENCER_MAX_BATCH_SIZE:-1000}
    secrets:
      - db_password
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - olympus-socket:/run/olympus
    networks:
      - backend
    restart: unless-stopped
    # The distroless/static runtime has no shell or curl, so we exec the
    # sequencer binary itself in --healthcheck mode (loopback GET against
    # /v1/healthz). The healthcheck path is intentionally token-free; see
    # internal/api/sequencer.go::handleHealthz for the trust rationale.
    healthcheck:
      test: ["CMD", "/sequencer", "--healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    read_only: true
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Main Application Services
  # ---------------------------------------------------------------------------

  # Optional: Application service (use `docker compose up -d app` to run full stack)
  app:
    build:
      context: .
      target: production
    container_name: olympus-api
    env_file:
      - .env
    command: ["/bin/sh", "/app/scripts/startup.sh"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${OLYMPUS_DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.api-http.middlewares=redirect-to-https"
    environment:
      # Construct URL at runtime from components, not as a single credential-bearing string
      DATABASE_HOST: db
      DATABASE_NAME: ${DATABASE_NAME:?DATABASE_NAME must be set}
      DATABASE_USER: ${DATABASE_USER:?DATABASE_USER must be set}
      DATABASE_PASSWORD_FILE: /run/secrets/db_password
      OLYMPUS_DEV_SIGNING_KEY: ${OLYMPUS_DEV_SIGNING_KEY:-true}
      OLYMPUS_API_KEYS_JSON: '${OLYMPUS_API_KEYS_JSON:-[]}'
      # Go sequencer configuration (only used when OLYMPUS_USE_GO_SEQUENCER=true)
      OLYMPUS_USE_GO_SEQUENCER: ${OLYMPUS_USE_GO_SEQUENCER:-false}
      OLYMPUS_SEQUENCER_URL: ${OLYMPUS_SEQUENCER_URL:-http://sequencer-go:8081}
      OLYMPUS_SEQUENCER_TOKEN: ${OLYMPUS_SEQUENCER_TOKEN}
      OLYMPUS_SEQUENCER_TIMEOUT_SECONDS: ${OLYMPUS_SEQUENCER_TIMEOUT_SECONDS:-30}
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5
    networks:
      - frontend
      - backend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run

  ui:
    build:
      context: .
      target: production
    container_name: olympus-ui
    env_file:
      - .env
    command: ["uvicorn", "ui.app:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      UI_API_BASE: ${UI_API_BASE}
      PSYCOPG_URL: ${PSYCOPG_URL:?Set PSYCOPG_URL in .env}
      OLYMPUS_DEBUG_UI: ${OLYMPUS_DEBUG_UI:-false}
      ORACLE_RATE_LIMIT_REQUESTS: ${ORACLE_RATE_LIMIT_REQUESTS:-10}
      ORACLE_RATE_LIMIT_WINDOW_SECONDS: ${ORACLE_RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - frontend
    # Tune these values for your deployment environment
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Public Verification UI (React + nginx)
  # ---------------------------------------------------------------------------
  # Statically built React SPA served from a hardened nginx image. Routes
  # /ingest, /datasets, and /v1 are reverse-proxied to the `app` service so
  # the browser only ever talks to a single origin (no CORS preflight, no
  # third-party tracking).
  public-ui:
    build:
      context: app/public-ui
      dockerfile: Dockerfile
    container_name: olympus-public-ui
    depends_on:
      app:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.public-ui.rule=Host(`${OLYMPUS_PUBLIC_DOMAIN:-${OLYMPUS_DOMAIN}}`)"
      - "traefik.http.routers.public-ui.entrypoints=websecure"
      - "traefik.http.routers.public-ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.public-ui.loadbalancer.server.port=8080"
    ports:
      - "127.0.0.1:8090:8080"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      # nginx writes its pid file plus client/proxy temp dirs under /tmp.
      # Mounting it as tmpfs (with mode=0700) keeps the container fully
      # read-only while still allowing nginx to start.
      - /tmp:mode=0700,size=64m
      - /var/cache/nginx:mode=0700,size=32m

volumes:
  olympus_pgdata:
  letsencrypt:
  # Shared Unix socket volume for Rust ↔ Go communication
  olympus-socket:
