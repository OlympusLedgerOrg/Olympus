[package]
edition = "2024"
rust-version = "1.88"
name = "pg-embed"
version = "1.0.0"
authors = ["Franz-Aliu Okunega <aokunega@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Run a Postgresql database locally on Linux, MacOS or Windows as part of another Rust application or test."
documentation = "https://docs.rs/pg-embed"
readme = "README.md"
keywords = [
    "database",
    "postgres",
    "postgresql",
    "embedded",
    "server",
]
categories = [
    "database",
    "database-implementations",
    "development-tools",
    "asynchronous",
]
license = "MIT/Apache-2.0"
repository = "https://github.com/faokunega/pg-embed"

[features]
default = ["rt_tokio_migrate"]
rt_tokio = [
    "tokio",
    "reqwest",
]
rt_tokio_migrate = [
    "tokio",
    "reqwest",
    "sqlx",
]

[lib]
name = "pg_embed"
path = "src/lib.rs"

[[test]]
name = "auth"
path = "tests/auth.rs"
required-features = ["rt_tokio"]

[[test]]
name = "auth_migrate"
path = "tests/auth.rs"
required-features = ["rt_tokio_migrate"]

[[test]]
name = "common"
path = "tests/common.rs"

[[test]]
name = "database"
path = "tests/database.rs"
required-features = ["rt_tokio_migrate"]

[[test]]
name = "extension"
path = "tests/extension.rs"
required-features = ["rt_tokio_migrate"]

[[test]]
name = "lifecycle"
path = "tests/lifecycle.rs"
required-features = ["rt_tokio"]

[[test]]
name = "lifecycle_migrate"
path = "tests/lifecycle.rs"
required-features = ["rt_tokio_migrate"]

[[test]]
name = "migration"
path = "tests/migration.rs"
required-features = ["rt_tokio_migrate"]

[dependencies.dirs]
version = "6.0"

[dependencies.log]
version = "0.4"

[dependencies.lzma-rs]
version = "0.3"

[dependencies.reqwest]
version = "0.13"
optional = true

[dependencies.sqlx]
version = "0.8"
features = [
    "runtime-tokio-rustls",
    "postgres",
    "migrate",
]
optional = true

[dependencies.tar]
version = "0.4"

[dependencies.thiserror]
version = "2"

[dependencies.tokio]
version = "1"
features = ["full"]
optional = true

[dependencies.zip]
version = "8"

[dev-dependencies.env_logger]
version = "0.11"

[dev-dependencies.futures]
version = "0.3"

[dev-dependencies.serial_test]
version = "3"
features = ["file_locks"]

[dev-dependencies.tempfile]
version = "3"
