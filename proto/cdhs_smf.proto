syntax = "proto3";

package olympus.cdhs_smf.v1;

option go_package = "github.com/OlympusLedgerOrg/Olympus/services/sequencer/proto";

// CD-HS-ST Service: Constant-Depth Hierarchical Sparse Tree
//
// This service maintains a single global 256-level Sparse Merkle Tree with
// composite keys that encode both shard identity and record identity.

service CdhsSmfService {
  // Insert or update a record in the global SMT.
  //
  // DEPRECATED for write paths that require crash safety: this RPC mutates
  // the in-memory SMT immediately, before any external storage durability
  // step. Sequencers MUST use the two-phase
  // PrepareUpdate / CommitPreparedUpdate flow (see H-2) so that durable
  // (Postgres) state and live (Rust) state cannot diverge on storage failure.
  // Update() is retained for tests and for callers that have no external
  // durability requirements.
  rpc Update(UpdateRequest) returns (UpdateResponse);

  // Phase 1 of two-phase commit: compute the new root + deltas for an update
  // WITHOUT mutating the live in-memory SMT. The prepared transaction is
  // held in a bounded LRU keyed by transaction_id; the caller MUST follow
  // up with either CommitPreparedUpdate or AbortPreparedUpdate. Prepared
  // transactions whose TTL elapses are evicted and treated as aborted.
  //
  // A prepared-but-uncommitted update MUST NOT appear in any signed root
  // or proof returned by GetRoot / ProveInclusion / Update.
  rpc PrepareUpdate(PrepareUpdateRequest) returns (PrepareUpdateResponse);

  // Phase 2 of two-phase commit: atomically apply a previously prepared
  // update to the live SMT. Returns NOT_FOUND if the transaction id is
  // unknown (already committed, aborted, or evicted), or FAILED_PRECONDITION
  // if another commit has advanced the root since the transaction was
  // prepared (the caller should Abort and re-prepare).
  rpc CommitPreparedUpdate(CommitPreparedUpdateRequest) returns (CommitPreparedUpdateResponse);

  // Discard a prepared transaction. Idempotent: returns OK whether or not
  // the transaction is currently in the prepared store. Callers MUST invoke
  // this on any failure path between PrepareUpdate and CommitPreparedUpdate
  // so that the prepared LRU does not fill up with abandoned entries.
  rpc AbortPreparedUpdate(AbortPreparedUpdateRequest) returns (AbortPreparedUpdateResponse);

  // Generate an inclusion proof for a key
  rpc ProveInclusion(ProveInclusionRequest) returns (ProveInclusionResponse);

  // Verify an inclusion proof
  rpc VerifyInclusion(VerifyInclusionRequest) returns (VerifyInclusionResponse);

  // Generate a non-inclusion proof for a key
  rpc ProveNonInclusion(ProveNonInclusionRequest) returns (ProveNonInclusionResponse);

  // Verify a non-inclusion proof
  rpc VerifyNonInclusion(VerifyNonInclusionRequest) returns (VerifyNonInclusionResponse);

  // Canonicalize a record (for consistency)
  rpc Canonicalize(CanonicalizeRequest) returns (CanonicalizeResponse);

  // Get the current root hash
  rpc GetRoot(GetRootRequest) returns (GetRootResponse);

  // Sign a root hash with Ed25519
  rpc SignRoot(SignRootRequest) returns (SignRootResponse);

  // Replay persisted leaves into the in-memory SMT at startup
  rpc ReplayLeaves(ReplayRequest) returns (ReplayResponse);
}

// Request to update (insert or modify) a record
message UpdateRequest {
  // Shard identifier (e.g., "watauga:2025:budget")
  string shard_id = 1;

  // Record key components (type, id, version, etc.)
  RecordKey record_key = 2;

  // Canonicalized record content (already canonicalized)
  bytes canonical_content = 3;

  // Parser identity ("<name>@<version>", e.g. "docling@2.3.1"). Required by
  // ADR-0003: this is bound into the leaf hash domain. Empty string is
  // rejected by the service.
  string parser_id = 4;

  // Operator-controlled stable canonical parser version (e.g. "v1"). Required
  // by ADR-0003: this is bound into the leaf hash domain. Empty string is
  // rejected by the service.
  string canonical_parser_version = 5;
}

// Response from update operation
message UpdateResponse {
  // The new root hash after update
  bytes new_root = 1;

  // The global key that was computed
  bytes global_key = 2;

  // The leaf value hash that was stored
  bytes leaf_value_hash = 3;

  // SMT node deltas (for persistence)
  repeated SmtNodeDelta deltas = 4;

  // Tree size after this update (number of non-empty leaves)
  uint64 tree_size = 5;
}

// Request to prepare an update (phase 1 of two-phase commit).
//
// Identical wire shape to UpdateRequest; the difference is purely in the
// service-side semantics (no SMT mutation).
message PrepareUpdateRequest {
  // Shard identifier (e.g., "watauga:2025:budget")
  string shard_id = 1;

  // Record key components (type, id, version, etc.)
  RecordKey record_key = 2;

  // Canonicalized record content (already canonicalized)
  bytes canonical_content = 3;

  // Parser identity ("<name>@<version>"). Required by ADR-0003 and bound
  // into the leaf hash domain. Empty string is rejected by the service.
  string parser_id = 4;

  // Operator-controlled stable canonical parser version (e.g. "v1").
  // Required by ADR-0003 and bound into the leaf hash domain. Empty string
  // is rejected by the service.
  string canonical_parser_version = 5;
}

// Response from PrepareUpdate. Carries the same data as UpdateResponse so
// the sequencer can persist deltas + sign the new root before calling
// CommitPreparedUpdate, plus a transaction_id used to commit/abort.
message PrepareUpdateResponse {
  // Opaque transaction identifier. The caller MUST pass this back to
  // CommitPreparedUpdate or AbortPreparedUpdate.
  string transaction_id = 1;

  // The root hash that the SMT will hold AFTER this prepared update is
  // committed. Identical to what Update() would have returned.
  bytes new_root = 2;

  // The root hash the SMT held at the moment of preparation. Used by
  // CommitPreparedUpdate to detect that another commit has advanced the
  // root in the meantime.
  bytes prior_root = 3;

  // The global key that was computed from (shard_id, record_key).
  bytes global_key = 4;

  // The leaf value hash that will be stored.
  bytes leaf_value_hash = 5;

  // SMT node deltas to persist alongside the leaf. Same length / encoding
  // as UpdateResponse.deltas.
  repeated SmtNodeDelta deltas = 6;

  // Tree size after this prepared update is committed.
  uint64 tree_size = 7;
}

// Request to atomically commit a previously prepared update.
message CommitPreparedUpdateRequest {
  // Transaction id returned by PrepareUpdate.
  string transaction_id = 1;
}

// Response from CommitPreparedUpdate.
message CommitPreparedUpdateResponse {
  // The new root hash after the prepared update has been applied. Identical
  // to PrepareUpdateResponse.new_root on success.
  bytes new_root = 1;

  // Tree size after commit.
  uint64 tree_size = 2;
}

// Request to discard a previously prepared update.
message AbortPreparedUpdateRequest {
  // Transaction id returned by PrepareUpdate.
  string transaction_id = 1;
}

// Response from AbortPreparedUpdate. Empty for now; the RPC is idempotent
// and returns OK whether or not the transaction was still present.
message AbortPreparedUpdateResponse {}

// Record key components
message RecordKey {
  // Record type (e.g., "doc", "dataset", "appeal")
  string record_type = 1;

  // Record ID
  string record_id = 2;

  // Version (optional)
  string version = 3;

  // Additional metadata (for future extensibility)
  map<string, string> metadata = 4;
}

// SMT node delta for persistence
message SmtNodeDelta {
  // Path to the node (256 bits as bytes)
  bytes path = 1;

  // Level in the tree (0-255)
  uint32 level = 2;

  // New hash value
  bytes hash = 3;
}

// Request to prove inclusion
message ProveInclusionRequest {
  // Shard identifier
  string shard_id = 1;

  // Record key
  RecordKey record_key = 2;

  // Root hash to prove against (optional, uses current if not specified)
  bytes root = 3;
}

// Response with inclusion proof
message ProveInclusionResponse {
  // The global key
  bytes global_key = 1;

  // The leaf value hash
  bytes value_hash = 2;

  // Sibling hashes along the path (256 siblings)
  repeated bytes siblings = 3;

  // Root hash
  bytes root = 4;

  // Parser identity bound into the leaf hash domain (ADR-0003).
  string parser_id = 5;

  // Operator-controlled canonical parser version bound into the leaf hash
  // domain (ADR-0003).
  string canonical_parser_version = 6;
}

// Request to verify inclusion
message VerifyInclusionRequest {
  // Global key
  bytes global_key = 1;

  // Leaf value hash
  bytes value_hash = 2;

  // Sibling hashes
  repeated bytes siblings = 3;

  // Root hash to verify against
  bytes root = 4;

  // Parser identity bound into the leaf hash domain (ADR-0003). Empty string
  // is rejected by the service.
  string parser_id = 5;

  // Operator-controlled canonical parser version bound into the leaf hash
  // domain (ADR-0003). Empty string is rejected by the service.
  string canonical_parser_version = 6;
}

// Response from verification
message VerifyInclusionResponse {
  // Whether the proof is valid
  bool valid = 1;

  // Error message if invalid
  string error = 2;
}

// Request to prove non-inclusion
message ProveNonInclusionRequest {
  // Shard identifier
  string shard_id = 1;

  // Record key
  RecordKey record_key = 2;

  // Root hash to prove against (optional, uses current if not specified)
  bytes root = 3;
}

// Response with non-inclusion proof
message ProveNonInclusionResponse {
  // The global key
  bytes global_key = 1;

  // Sibling hashes along the path to empty leaf
  repeated bytes siblings = 2;

  // Root hash
  bytes root = 3;
}

// Request to verify non-inclusion
message VerifyNonInclusionRequest {
  // Global key
  bytes global_key = 1;

  // Sibling hashes
  repeated bytes siblings = 2;

  // Root hash to verify against
  bytes root = 3;
}

// Response from non-inclusion verification
message VerifyNonInclusionResponse {
  // Whether the proof is valid
  bool valid = 1;

  // Error message if invalid
  string error = 2;
}

// Request to canonicalize content
message CanonicalizeRequest {
  // Content type (e.g., "json", "html", "xml")
  string content_type = 1;

  // Raw content
  bytes content = 2;
}

// Response with canonicalized content
message CanonicalizeResponse {
  // Canonicalized content
  bytes canonical_content = 1;

  // Hash of canonicalized content
  bytes content_hash = 2;
}

// Request to get current root
message GetRootRequest {
  // No parameters needed
}

// Response with current root
message GetRootResponse {
  // Current root hash
  bytes root = 1;

  // Tree size (number of non-empty leaves)
  uint64 tree_size = 2;
}

// Request to sign a root
message SignRootRequest {
  // Root hash to sign
  bytes root = 1;

  // Tree size at the time of signing
  uint64 tree_size = 2;

  // Additional context (e.g., shard_id, record_id)
  map<string, string> context = 3;
}

// Response with signature
message SignRootResponse {
  // Ed25519 signature
  bytes signature = 1;

  // Public key used for signing
  bytes public_key = 2;
}

// Request to replay persisted leaves into the in-memory SMT
message ReplayRequest {
  // Ordered list of leaf entries to replay (insertion order, oldest first)
  repeated LeafEntry leaves = 1;
}

// A single leaf entry for replay
message LeafEntry {
  // 32-byte global key
  bytes key = 1;

  // 32-byte leaf value hash
  bytes value_hash = 2;

  // Parser identity bound into the leaf hash domain (ADR-0003). Empty string
  // is rejected by the service.
  string parser_id = 3;

  // Operator-controlled canonical parser version bound into the leaf hash
  // domain (ADR-0003). Empty string is rejected by the service.
  string canonical_parser_version = 4;
}

// Response from replay operation
message ReplayResponse {
  // Final root hash after replaying all leaves
  bytes root_hash = 1;
}
