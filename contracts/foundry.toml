[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"
solc    = "0.8.24"

optimizer       = true
optimizer_runs  = 200
via_ir          = false   # enable only if stack-too-deep forces it

[profile.default.fuzz]
runs = 512
seed = "0xdeadbeef"

[profile.default.invariant]
runs          = 64
depth         = 24
fail_on_revert = false    # handler functions intentionally swallow known-good reverts

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"

[etherscan]
# Add chain-specific keys here for verification:
# mainnet = { key = "${ETHERSCAN_API_KEY}" }
