repos:
  # Ruff: linting + formatting (fetches the correct binary for the platform)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # mypy: use the project venv so all stubs and third-party types are visible.
  # mirrors-mypy runs in isolation and misses installed packages (false results).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # Use the project venv so all installed stubs are visible.
        # mirrors-mypy runs in isolation and misses third-party types.
        # --platform linux: matches CI; suppresses Windows-only false positives
        # for POSIX-only os.* attributes (killpg, getpgid, SIGKILL).
        entry: python scripts/run-mypy.py
        language: system
        pass_filenames: false
        args: ["protocol/", "storage/", "api/", "--platform", "linux"]
        types: [python]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "protocol/", "storage/", "api/", "app_testonly/", "-f", "txt"]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: debug-statements
