name: ZK ceremony artifacts
description: |
  Restore (or, on cache miss, generate) the Groth16 ceremony artifacts that
  the src-tauri prover + integration tests need:
    proofs/build/<circuit>.r1cs
    proofs/build/<circuit>_js/<circuit>.wasm
    proofs/build/<circuit>_final.zkey
    proofs/build/<circuit>_final.ark.zkey
    proofs/keys/<circuit>.{wasm,r1cs,ark.zkey}
    proofs/keys/verification_keys/<circuit>_vkey.json

  Two-layer cache strategy:
    1. ptau cache: the 1.15 GB Hermez PTAU file lives in its own cache,
       keyed on URL+power (never changes per repo lifetime). Stable, so
       even ceremony cache invalidations don't redownload it.
    2. ceremony cache: only the finalized R1CS / wasm / zkey / ark.zkey /
       vkey JSON outputs. Globbed to exclude snarkjs intermediates,
       witness-gen C++ scratch, and node_modules. Keyed on circuit
       sources, setup script, package-lock, exporter binary source, and
       pinned circom2 version.

  Why split: the earlier monolithic cache (proofs/build + proofs/keys +
  proofs/node_modules) totaled ~3 GB and never successfully saved on
  ubuntu-latest — likely failing GH Actions' silent multi-GB upload
  reliability threshold and crowding the 10 GB per-repo quota. Splitting
  brings each layer well under the threshold (ptau ~1.2 GB stable,
  ceremony ~750 MB churn-rate).

inputs:
  circom2-version:
    description: Pinned circom2 npm version (compiler that produces R1CS/WASM).
    default: "0.2.22"

runs:
  using: composite
  steps:
    # ── Layer 1: PTAU cache ─────────────────────────────────────────────────
    # The Hermez ptau20 file is content-addressable by URL + power. It
    # doesn't change unless we move to a different ptau power, so the key
    # is stable and the cache reliably hits across runs.
    - name: Cache Hermez ptau20
      id: cache-ptau
      uses: actions/cache@v5
      with:
        path: proofs/keys/powersOfTau28_hez_final_20.ptau
        key: zk-ptau20-hez-v1

    # ── Layer 2: finalized ceremony artifacts cache ─────────────────────────
    # Globbed to capture only the final outputs the Rust prover + tests
    # need. Crucially excludes:
    #   - the 1.15 GB ptau file (cached separately above)
    #   - snarkjs scratch (*_0000.zkey, *.sym, witness inputs, *.wtns)
    #   - proofs/node_modules (cheap to reinstall via `npm ci`)
    #   - witness-generator JS shims (only the .wasm is needed at runtime)
    - name: Cache ceremony build outputs
      id: cache
      uses: actions/cache@v5
      with:
        path: |
          proofs/build/*.r1cs
          proofs/build/*_js/*.wasm
          proofs/build/*_final.zkey
          proofs/build/*_final.ark.zkey
          proofs/keys/*.wasm
          proofs/keys/*.r1cs
          proofs/keys/*.ark.zkey
          proofs/keys/verification_keys/*.json
        key: zk-ceremony-${{ runner.os }}-ptau20-circom${{ inputs.circom2-version }}-${{ hashFiles('proofs/circuits/**', 'proofs/setup_circuits.sh', 'proofs/package.json', 'proofs/package-lock.json', 'src-tauri/src/bin/export_ark_zkey.rs') }}
        restore-keys: |
          zk-ceremony-${{ runner.os }}-ptau20-circom${{ inputs.circom2-version }}-

    - name: Install nasm + circom2 (pinned) + proofs npm deps
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # snarkjs/ffiasm shells out to nasm during native witness-generator
        # compilation. Ubuntu runners ship make + g++ via build-essential
        # but not nasm. setup_circuits.sh fails fast (and clearly) without
        # it; install it here so the ceremony step is self-contained.
        sudo apt-get update
        sudo apt-get install -y nasm
        # Pin circom2 — an unpinned `latest` could change R1CS/WASM outputs
        # between runs, invalidating the cache silently.
        npm install -g "circom2@${{ inputs.circom2-version }}"
        cd proofs && npm ci

    - name: Run setup_circuits.sh
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      # setup_circuits.sh hardcodes PTAU_POWER=20 and doesn't accept a CLI
      # argument for it; the cache key matches that hardcoded value above.
      # If the ptau cache layer hit, the file is already on disk and the
      # script's `if [ -f "${PTAU_PATH}" ]` skip-download branch saves a
      # 1.15 GB redownload (~25 s).
      run: bash proofs/setup_circuits.sh

    - name: Invalidate olympus-desktop build (vkey changed)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      # setup_circuits.sh just rewrote
      #   proofs/keys/verification_keys/<circuit>_vkey.json
      # which src-tauri/src/zk/verify.rs pulls in via include_str!. The
      # Swatinem/rust-cache restored a target/ from a previous CI run
      # that bound to the *previously-committed* vkey; cargo's
      # fingerprint check can miss the include_str! change across cache
      # restores, leaving a stale-vkey-compiled lib. A targeted
      # `cargo clean` forces the next cargo build/test to pick up the
      # fresh vkey. Bounded scope: only the olympus-desktop crate is
      # cleaned, so deps stay cached.
      run: cargo clean -p olympus-desktop

    - name: Convert each .zkey → .ark.zkey for the Rust prover
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Build the converter once; reused for every circuit.
        cargo build --release -p olympus-desktop --bin export_ark_zkey
        # All four circuits compiled by setup_circuits.sh. The unified one
        # is exercised by src-tauri/tests/zk_prove_unified.rs.
        for c in document_existence non_existence redaction_validity \
                 unified_canonicalization_inclusion_root_sign; do
          in="proofs/build/${c}_final.zkey"
          out="proofs/build/${c}_final.ark.zkey"
          if [ -f "$in" ]; then
            ./target/release/export_ark_zkey "$in" "$out"
          else
            echo "WARN: ${in} not produced by setup_circuits.sh — skipping"
          fi
        done
