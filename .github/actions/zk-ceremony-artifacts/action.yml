name: ZK ceremony artifacts
description: |
  Restore (or, on cache miss, generate) the Groth16 ceremony artifacts that
  the src-tauri prover + integration tests need:
    proofs/build/<circuit>.r1cs
    proofs/build/<circuit>_js/<circuit>.wasm
    proofs/build/<circuit>_final.zkey
    proofs/build/<circuit>_final.ark.zkey
    proofs/keys/<circuit>.{wasm,r1cs,ark.zkey}
    proofs/keys/verification_keys/<circuit>_vkey.json
    proofs/keys/manifests/<circuit>_manifest.json

  Cache strategy:
    * The 1.15 GB Hermez PTAU file is fetched from a GitHub release asset
      (`ceremony-assets-v1`) rather than the Actions cache. This removes
      ~1.2 GB of pressure on the per-repo 10 GB cache quota — previously
      the ptau layer kept evicting (or being evicted by) the rust-cache
      entries on main, leaving every PR cold.
    * The finalized ceremony outputs (R1CS / WASM / zkey / ark.zkey /
      vkey JSON) still live in `actions/cache`. Globbed to exclude
      snarkjs intermediates, witness-gen C++ scratch, and node_modules.
      Keyed on circuit sources, setup script, package-lock, exporter
      binary source, and pinned circom2 version.

  Why a release asset for ptau: it's content-addressable, never changes,
  and `setup_circuits.sh` re-verifies the BLAKE2b-512 sum after download
  regardless of source — so swapping the upstream mirror doesn't weaken
  the integrity check. If the asset fetch fails, this step deletes the
  partial file and lets `setup_circuits.sh` fall through to its own
  `curl ... googleapis.com` download path (see PTAU_URL in the script).

inputs:
  circom2-version:
    description: Pinned circom2 npm version (compiler that produces R1CS/WASM).
    default: "0.2.22"
  ptau-release-tag:
    description: GitHub release tag hosting the PTAU asset.
    default: "ceremony-assets-v1"

runs:
  using: composite
  steps:
    # ── Finalized ceremony artifacts cache ──────────────────────────────────
    # Globbed to capture only the final outputs the Rust prover + tests
    # need. Crucially excludes:
    #   - the 1.15 GB ptau file (downloaded from release asset below)
    #   - snarkjs scratch (*_0000.zkey, *.sym, witness inputs, *.wtns)
    #   - proofs/node_modules (cheap to reinstall via `npm ci`)
    #   - witness-generator JS shims (only the .wasm is needed at runtime)
    #
    # The per-circuit ceremony manifests (proofs/keys/manifests/*.json) MUST
    # be cached together with the vkeys they pin. setup_circuits.sh regenerates
    # both as a matched pair (the manifest records blake3(vkey)); src-tauri's
    # build.rs panics at compile time if blake3(vkey.json) != manifest.vkey.
    # If the cache restored a regenerated vkey but left the manifest at the
    # committed value, that compile-time check fails (vkey regenerated, manifest
    # wasn't) — so the manifest glob below is load-bearing, not convenience.
    # The `-manifests1-` key salt forces a one-time rebuild of pre-existing
    # cache entries that predate manifest caching.
    - name: Cache ceremony build outputs
      id: cache
      uses: actions/cache@v5
      with:
        path: |
          proofs/build/*.r1cs
          proofs/build/*_js/*.wasm
          proofs/build/*_final.zkey
          proofs/build/*_final.ark.zkey
          proofs/keys/*.wasm
          proofs/keys/*.r1cs
          proofs/keys/*.ark.zkey
          proofs/keys/verification_keys/*.json
          proofs/keys/manifests/*.json
        key: zk-ceremony-${{ runner.os }}-ptau20-manifests1-circom${{ inputs.circom2-version }}-${{ hashFiles('proofs/circuits/**', 'proofs/setup_circuits.sh', 'proofs/package.json', 'proofs/package-lock.json', 'src-tauri/src/bin/export_ark_zkey.rs') }}
        restore-keys: |
          zk-ceremony-${{ runner.os }}-ptau20-manifests1-circom${{ inputs.circom2-version }}-

    - name: Fetch Hermez ptau20 from release asset
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Pre-populate proofs/keys/powersOfTau28_hez_final_20.ptau from the
        # repo's release asset rather than letting setup_circuits.sh fetch
        # from storage.googleapis.com on every cache miss. The script's
        # `if [ -f "${PTAU_PATH}" ]` short-circuit then skips the download.
        # BLAKE2b integrity is re-verified inside the script after this
        # step, so a tampered asset still fails fast.
        mkdir -p proofs/keys
        out="proofs/keys/powersOfTau28_hez_final_20.ptau"
        if gh release download "${{ inputs.ptau-release-tag }}" \
             --repo "${{ github.repository }}" \
             --pattern "powersOfTau28_hez_final_20.ptau" \
             --output "$out" --clobber; then
          echo "Downloaded ptau from release ${{ inputs.ptau-release-tag }}"
        else
          # Don't fail the job — let setup_circuits.sh fall through to its
          # own googleapis.com fetch. This keeps the action functional even
          # if the release asset is missing/renamed during a tag rotation.
          echo "WARN: release asset fetch failed; falling back to googleapis in setup_circuits.sh"
          rm -f "$out"
        fi

    - name: Cache ~/.npm for proofs ceremony tooling
      # Only the ceremony-cache *miss* path runs `npm ci` below; on a hit the
      # whole install is skipped. Caching ~/.npm (the npm download cache, not
      # node_modules) lets that cold-rebuild `npm ci` resolve snarkjs/circomlib/
      # blake3 from disk instead of re-downloading from the registry. Keyed on
      # the proofs lockfile so a dependency bump invalidates it.
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: ${{ runner.os }}-proofs-npm-${{ hashFiles('proofs/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-proofs-npm-

    - name: Install nasm + circom2 (pinned) + proofs npm deps
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # snarkjs/ffiasm shells out to nasm during native witness-generator
        # compilation. Ubuntu runners ship make + g++ via build-essential
        # but not nasm. setup_circuits.sh fails fast (and clearly) without
        # it; install it here so the ceremony step is self-contained.
        sudo apt-get update
        sudo apt-get install -y nasm
        # Pin circom2 — an unpinned `latest` could change R1CS/WASM outputs
        # between runs, invalidating the cache silently.
        npm install -g "circom2@${{ inputs.circom2-version }}"
        cd proofs && npm ci

    - name: Run setup_circuits.sh
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      # setup_circuits.sh hardcodes PTAU_POWER=20 and doesn't accept a CLI
      # argument for it. If the release-asset fetch above populated
      # proofs/keys/powersOfTau28_hez_final_20.ptau, the script's
      # `if [ -f "${PTAU_PATH}" ]` skip-download branch saves the 1.15 GB
      # googleapis fetch (~25 s) and the b2sum check still runs.
      run: bash proofs/setup_circuits.sh

    - name: Invalidate olympus-desktop build (vkey changed)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      # setup_circuits.sh just rewrote
      #   proofs/keys/verification_keys/<circuit>_vkey.json
      # which src-tauri/src/zk/verify.rs pulls in via include_str!. The
      # Swatinem/rust-cache restored a target/ from a previous CI run
      # that bound to the *previously-committed* vkey; cargo's
      # fingerprint check can miss the include_str! change across cache
      # restores, leaving a stale-vkey-compiled lib. A targeted
      # `cargo clean` forces the next cargo build/test to pick up the
      # fresh vkey. Bounded scope: only the olympus-desktop crate is
      # cleaned, so deps stay cached.
      run: cargo clean -p olympus-desktop

    - name: Convert each .zkey → .ark.zkey for the Rust prover
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Build the converter once; reused for every circuit.
        cargo build --release -p olympus-desktop --bin export_ark_zkey
        # All four circuits compiled by setup_circuits.sh. The unified one
        # is exercised by src-tauri/tests/zk_prove_unified.rs.
        for c in document_existence non_existence redaction_validity \
                 unified_canonicalization_inclusion_root_sign; do
          in="proofs/build/${c}_final.zkey"
          out="proofs/build/${c}_final.ark.zkey"
          if [ -f "$in" ]; then
            ./target/release/export_ark_zkey "$in" "$out"
          else
            echo "WARN: ${in} not produced by setup_circuits.sh — skipping"
          fi
        done
