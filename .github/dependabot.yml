version: 2
# Python and Go are retired (v0.9.0). Dependabot only watches the surviving
# Rust workspace + verifier, the npm trees, and GitHub Actions. Removed stale
# entries (audit L-SC-1): pip /, gomod /verifiers/go, gomod
# /services/sequencer-go, and cargo /services/cdhs-smf-rust (trees deleted).
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "OlympusLedgerOrg"
    labels:
      - "dependencies"
      - "security"
  - package-ecosystem: "cargo"
    directory: "/verifiers/rust"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "OlympusLedgerOrg"
    labels:
      - "dependencies"
      - "security"
  - package-ecosystem: "npm"
    directory: "/proofs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "OlympusLedgerOrg"
    labels:
      - "dependencies"
      - "security"
    ignore:
      # jsonpath is pinned to file:./safe-jsonpath — a local security shim
      # that replaces the insecure upstream package. Dependabot cannot resolve
      # file: paths and errors out. The shim is intentional; ignore permanently.
      - dependency-name: "jsonpath"
  - package-ecosystem: "npm"
    directory: "/verifiers/javascript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "OlympusLedgerOrg"
    labels:
      - "dependencies"
      - "security"
  - package-ecosystem: "npm"
    directory: "/app/public-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "OlympusLedgerOrg"
    labels:
      - "dependencies"
      - "security"
    ignore:
      - dependency-name: "eslint"
        versions: [">=10"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "OlympusLedgerOrg"
    labels:
      - "dependencies"
