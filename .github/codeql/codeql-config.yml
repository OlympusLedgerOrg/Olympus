# CodeQL configuration for Olympus.
#
# `query-filters` excludes specific rule IDs on specific paths after the
# usual `security-extended,security-and-quality` query packs have run.
# Each exclusion documents WHY the alert is accepted — the threat-model
# rationale belongs here, not in inline `// codeql[...]` comments (which
# GitHub Code Scanning does not honour).

name: "Olympus Code Scanning config"

# Skip vendored upstream crates. We ship these byte-identical to their
# upstream releases (modulo documented targeted backports — see each
# crate's PROVENANCE.md). Findings here are upstream's responsibility
# and would otherwise add noise on every PR. Specifically:
#   - crates/glib-0.18.5-patched/ — gtk-rs/gtk-rs-core glib 0.18.5 with
#     the GHSA-wrw7-89jp-8q8g VariantStrIter fix backported (2 lines in
#     src/variant_iter.rs). The rest is upstream FFI glue: pervasive
#     unsafe pointer ops into gobject_ffi, which CodeQL flags as
#     "Access of invalid pointer" because it can't model the C side.
#     None of those findings are touched by our patch (verified by
#     diffing against the vanilla crates.io 0.18.5 tarball; the diff
#     is confined to src/variant_iter.rs::impl_get).
#   - crates/light-poseidon/ — Lightprotocol/light-poseidon v0.4.0 with
#     audit-required arkworks-0.6 + thiserror-2 + workspace-metadata
#     pin edits (see crates/light-poseidon/PROVENANCE.md and the
#     scripts/check_light_poseidon_upstream.sh drift check that fails
#     CI on any change to the cryptographic-bearing files).
# In both cases the upstream-drift check / `[patch.crates-io]` retire-
# when condition is the authority on whether the vendored crate is
# current; CodeQL findings on those paths add noise without coverage.
paths-ignore:
  - "crates/glib-0.18.5-patched/**"
  - "crates/light-poseidon/**"

# Previously this file held a `js/clear-text-storage-of-sensitive-information`
# exclusion covering `app/public-ui/src/lib/storage.ts` and the old
# "persist secrets to localStorage with a documented CWE-312 trade-off"
# design. That design has been replaced with module-level JavaScript-only
# storage (`inMemoryApiKey` / `inMemoryAdminKey` in storage.ts) — no secret
# is written to localStorage anywhere. The exclusion is therefore stale
# and is removed so any future regression that resurrects
# `localStorage.setItem("olympus_*_key", ...)` (or analogous patterns
# elsewhere in the tree) is caught by CodeQL. Audit finding F-7.
query-filters:
  # `rust/unused-variable` (from the `security-and-quality` quality pack) is
  # excluded as a systematic false-positive source for this codebase.
  #
  # WHY it's safe to drop: rustc's own `unused_variables` lint is the source of
  # truth for genuinely-unused bindings, and CI already builds clean
  # (`cargo check` / `cargo clippy --workspace`) with zero unused-variable
  # warnings. CodeQL's Rust extractor does NOT model implicit capture in inline
  # format strings — `format!("{e}")`, `tracing::warn!("…{i}…")`, etc. — so it
  # reports variables that are in fact used as "unused". That produced a steady
  # stream of Note-level false positives (gossip.rs, redaction.rs, ingest.rs,
  # main.rs, anchoring/cron.rs) that recurred on every PR which added an
  # idiomatic inline-capture log line (the fixes in #1050 were re-flagged after
  # #1059 / #1063 rewrote those files). rustc still catches real unused vars, so
  # excluding this one quality query loses no genuine coverage.
  #
  # NOTE: security queries are unaffected — the crypto / injection / etc. packs
  # still run. Only this single redundant quality rule is filtered.
  - exclude:
      id: rust/unused-variable
