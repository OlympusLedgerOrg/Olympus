name: Build CI Docker Image

# Rebuilds and pushes ghcr.io/olympusledgerorg/olympus-ci whenever
# docker/Dockerfile.ci changes on main. Also available via workflow_dispatch
# for manual rebuilds (e.g. after a Rust toolchain or circom version bump).
#
# The image is pulled by the `proofs` and `full` CI jobs to skip the ~4 min
# toolchain install phase. Bump circom/Rust versions in Dockerfile.ci, trigger
# this workflow, then update the circuit artifact cache key in ci.yml.

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.ci'
  workflow_dispatch:

concurrency:
  group: build-ci-image
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push olympus-ci image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.ci
          push: true
          tags: |
            ghcr.io/olympusledgerorg/olympus-ci:latest
            ghcr.io/olympusledgerorg/olympus-ci:${{ github.sha }}
          # Layer cache stored in GHA cache — subsequent builds only rebuild
          # changed layers (e.g. a circom version bump only re-runs that RUN).
          cache-from: type=gha
          cache-to: type=gha,mode=max
