name: React Compiler Smoke

on:
  workflow_dispatch:

concurrency:
  group: react-compiler-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: compiler-mode frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.1.2"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: React Compiler build smoke
        run: pnpm --filter public-ui build:compiler
