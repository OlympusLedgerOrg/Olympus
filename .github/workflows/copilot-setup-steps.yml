name: Copilot setup steps

on:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download powers of tau parameters
        run: |
          mkdir -p proofs/keys
          curl -fSL --connect-timeout 30 --retry 3 --retry-delay 5 \
            -o proofs/keys/powersOfTau28_hez_final_17.ptau \
            https://hermez.s3-eu-west-1.amazonaws.com/powersOfTau28_hez_final_17.ptau
