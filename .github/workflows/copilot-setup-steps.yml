name: Copilot setup steps

on:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: proofs/package-lock.json

      - name: Install proofs JS dependencies
        run: npm install --prefix proofs

      - name: Download powers of tau parameters
        run: |
          set -euo pipefail
          mkdir -p proofs/keys
          PTAU_PATH="proofs/keys/powersOfTau28_hez_final_17.ptau"
          PTAU_URL="https://hermez.s3-eu-west-1.amazonaws.com/powersOfTau28_hez_final_17.ptau"
          PTAU_B2="6247a3433948b35fbfae414fa5a9355bfb45f56efa7ab4929e669264a0258976741dfbe3288bfb49828e5df02c2e633df38d2245e30162ae7e3bcca5b8b49345"

          if curl -fSL --connect-timeout 30 --retry 3 --retry-delay 5 \
            -o "${PTAU_PATH}" "${PTAU_URL}"; then
            echo "${PTAU_B2}  ${PTAU_PATH}" | b2sum --check -
          else
            echo "WARNING: Could not download PTAU parameters; skipping optional setup step."
            rm -f "${PTAU_PATH}"
          fi
