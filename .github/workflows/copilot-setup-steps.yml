name: Copilot setup steps

on:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=${GITHUB_WORKSPACE}/.venv" >> "$GITHUB_ENV"
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install agent pre-commit hooks
        run: pre-commit install --install-hooks

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Install Rust stable
        run: rustup toolchain install stable --no-self-update && rustup default stable

      - name: Build olympus_core Rust extension
        run: python -m maturin develop --release

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: proofs/package-lock.json

      - name: Install proofs JS dependencies
        run: npm ci --ignore-scripts --prefix proofs

      # rapidsnark/ffiasm emits native field arithmetic assembly and requires
      # nasm plus a small C++ build toolchain. Install these before the vendor
      # build so setup failures point at the missing system dependency directly.
      - name: Install native proof-toolchain prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            g++ \
            libgmp-dev \
            libsodium-dev \
            nasm \
            pkg-config

      - name: Cache powers of tau parameters
        id: cache-ptau
        uses: actions/cache@v4
        with:
          path: proofs/keys/powersOfTau28_hez_final_19.ptau
          key: ptau-19

      - name: Download powers of tau parameters
        if: steps.cache-ptau.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p proofs/keys
          PTAU_PATH="proofs/keys/powersOfTau28_hez_final_19.ptau"
          PTAU_URL="https://storage.googleapis.com/zkevm/ptau/powersOfTau28_hez_final_19.ptau"
          PTAU_B2="bca9d8b04242f175189872c42ceaa21e2951e0f0f272a0cc54fc37193ff6648600eaf1c555c70cdedfaf9fb74927de7aa1d33dc1e2a7f1a50619484989da0887"

          if curl -fSL --connect-timeout 30 --retry 3 --retry-delay 5 \
            -o "${PTAU_PATH}" "${PTAU_URL}"; then
            echo "${PTAU_B2}  ${PTAU_PATH}" | b2sum --check -
          else
            echo "WARNING: Could not download PTAU parameters; skipping optional setup step."
            rm -f "${PTAU_PATH}"
          fi

      - name: Install rapidsnark (native C++ Groth16 prover — 5-10× faster than snarkjs)
        run: |
          set -euo pipefail
          # Use Mysten Labs' native task-based build. The prover binary is
          # produced at /tmp/rapidsnark/build/prover.
          git clone --recursive https://github.com/MystenLabs/rapidsnark.git /tmp/rapidsnark
          cd /tmp/rapidsnark
          npm install
          git submodule update --init --recursive
          npx task createFieldSources
          npx task buildProver
          test -x /tmp/rapidsnark/build/prover
          sudo cp /tmp/rapidsnark/build/prover /usr/local/bin/rapidsnark
          rapidsnark --version 2>/dev/null || echo "rapidsnark installed successfully"
