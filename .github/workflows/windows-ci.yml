name: Windows CI

# Compile + unit-test on a real Windows runner so PRs catch Windows-specific
# breakage early. Windows is a primary shipping target (CLAUDE.md), but until now
# it had NO PR/push CI: ci.yml is Ubuntu-only, macos-ci.yml covers macOS, and
# tauri-release.yml builds Windows only on `v*` tags with no test step — so a
# Windows-only compile break could reach a release tag untested. This closes that
# gap (the macos-ci.yml header already referenced "the Linux/Windows jobs").
#
# Scope, deliberately matched to macos-ci.yml:
#   * Builds the desktop crate with the app's feature set
#     (--no-default-features --features prover). build.rs drops PLACEHOLDER ZK
#     artifacts so this compiles without the circuit ceremony.
#   * Runs the DB-free unit tests (olympus-crypto + the olympus-desktop lib).
#   * Does NOT run the pg_embed integration tests (tests/*_db.rs): they download
#     PostgreSQL at runtime and are timing-flaky in CI (notably so on Windows).
#   * Does NOT enable the `federation` feature: the Tor/arti stack pulls a
#     bundled rusqlite that fails to LINK on the Windows MSVC host (LNK1181
#     sqlite3.lib). Federation stays type-checked on Linux in ci.yml.
#   * Docs-only changes and draft PRs are skipped (a cold compile of arkworks +
#     tauri + sqlx on Windows is slow; rust-cache only helps warm runs).
# Not a required status check — informational, like macos-ci.yml.

on:
  # Push scoped to main (like ci.yml / macos-ci.yml) so branch work is covered
  # once via the PR event and main pushes once via push.
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  # Key on the PR head branch when present and the pushed ref otherwise, so a
  # push and its PR collapse into one group and don't run twice.
  group: windows-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only checks out + builds/tests
# PR-controlled code (pnpm/cargo), so it needs read access to repo contents and
# nothing else — every unlisted scope is implicitly `none`. Matches the per-job
# `permissions: contents: read` convention in ci.yml.
permissions:
  contents: read

jobs:
  windows:
    # Skip draft PRs (matches the macos-ci.yml `setup` job gate).
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: build+test (x86_64-pc-windows-msvc)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't leave the job token in git config while running PR-controlled
          # build/test commands (pnpm/cargo) after checkout.
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          # `toolchain` is required when the action is pinned to a SHA (the
          # `@stable` tag magic that infers it is lost on a commit pin).
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: ". -> target"

      - name: Install pnpm
        # No `version:` — the action reads packageManager (pnpm@11.x) from
        # package.json. Passing an explicit version conflicts and errors.
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Frontend build
        run: pnpm --filter public-ui build

      # Build the desktop crate with the same feature set the app uses
      # (`cargo tauri dev` → --no-default-features --features prover). build.rs
      # drops PLACEHOLDER ZK artifacts so this compiles without the circuit
      # ceremony — runtime ZK prove/verify still needs setup_circuits.sh.
      # `federation` is intentionally omitted (see header: LNK1181 on MSVC).
      - name: Build olympus-desktop
        run: cargo build -p olympus-desktop --no-default-features --features prover

      # Pure, DB-free unit tests: cross-impl crypto conformance + the desktop
      # crate's lib unit tests (canonicalization, leaf/SMT hashing, auth scope
      # mapping, …). Host == target, so these run natively.
      - name: Unit tests (olympus-crypto)
        run: cargo test -p olympus-crypto --all-features

      - name: Unit tests (olympus-desktop lib)
        run: cargo test -p olympus-desktop --no-default-features --features prover --lib
