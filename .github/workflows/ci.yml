name: Olympus CI

on:
  workflow_dispatch:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify dependency consistency
      run: pip check

    - name: Validate JSON schemas
      run: python tools/validate_schemas.py

    - name: Ruff lint
      run: ruff check protocol/ storage/ api/ app_testonly/ tests/ --output-format=github

    - name: Ruff format check
      run: ruff format --check protocol/ storage/ api/ app_testonly/ tests/

    - name: Bandit scan
      run: bandit -r protocol/ storage/ api/ app_testonly/ -f txt

  typecheck:
    name: typecheck (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: MyPy type check
      run: mypy protocol/ storage/ api/

  unit:
    name: unit (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify dependency consistency
      run: pip check

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: proofs/package-lock.json

    - name: Install proofs JS dependencies
      run: npm install --prefix proofs

    - name: Run unit tests with coverage floor
      run: |
        pytest tests/ -v --tb=short -m "not postgres" \
          --cov=protocol --cov=app_testonly --cov=storage --cov=api \
          --cov-report=xml \
          --cov-fail-under=85

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v7
      with:
        name: coverage-py${{ matrix.python-version }}
        path: coverage.xml

  integration-postgres:
    name: integration (postgres, py3.12, ubuntu)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus
      TEST_DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: olympus
      PGPASSWORD: olympus
      PGDATABASE: olympus
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: olympus
          POSTGRES_PASSWORD: olympus
          POSTGRES_DB: olympus
        options: >-
          --health-cmd "pg_isready -U olympus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify dependency consistency
      run: pip check

    - name: Apply database migrations
      run: |
        for migration in $(ls migrations/*.sql | sort); do
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
        done

    - name: Run integration tests
      run: |
        pytest tests/ -v --tb=short -m "postgres"

  supply-chain:
    name: supply-chain (sbom + audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom==7.2.2 pip-audit==2.8.0

      - name: Generate SBOM (CycloneDX)
        run: |
          cyclonedx-py requirements requirements.txt \
            --pyproject pyproject.toml \
            --output-reproducible \
            --of json \
            -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.json

      - name: Dependency vulnerability audit
        run: |
          IGNORE_ARGS=$(grep -v '^[[:space:]]*#' pip-audit-baseline.txt | awk 'NF {printf "--ignore-vuln %s ", $1}')
          pip-audit -r requirements.txt -r requirements-dev.txt \
            --progress-spinner off \
            ${IGNORE_ARGS}
