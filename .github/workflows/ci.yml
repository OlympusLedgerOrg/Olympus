name: Olympus CI

on:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Database Strategy (see docs/08_database_strategy.md):
    # - PostgreSQL is the ONLY production backend
    # - CI uses Postgres to ensure production parity
    # - E2E tests (test_e2e_audit.py, test_storage.py) require Postgres
    # - API tests (test_api_proofs.py) use SQLite for proof logic only
    env:
      DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus_test
      TEST_DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus_test
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: olympus
      PGPASSWORD: olympus
      PGDATABASE: olympus_test
    
    # PostgreSQL service for E2E and storage tests
    # Required by: test_e2e_audit.py, test_storage.py
    # NOT used by: test_api_proofs.py (uses temporary SQLite)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: olympus
          POSTGRES_PASSWORD: olympus
          POSTGRES_DB: olympus_test
        options: >-
          --health-cmd="pg_isready -U olympus -d olympus_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
        pip install -r requirements-dev.txt || true
        pip install -e .

    - name: Wait for PostgreSQL
      run: |
        for i in {1..60}; do
          pg_isready -h localhost -p 5432 -d olympus_test && break
          sleep 1
        done

    - name: Validate JSON schemas
      run: python tools/validate_schemas.py

    - name: Run ruff linting
      run: |
        ruff check protocol/ storage/ api/ app/ tests/ --output-format=github

    - name: Run ruff formatting check
      run: |
        ruff format --check protocol/ storage/ api/ app/ tests/

    - name: Run mypy type checking
      run: |
        mypy protocol/ storage/ api/

    - name: Run bandit security scan
      run: |
        bandit -r protocol/ storage/ api/ app/ -f txt
      continue-on-error: true

    - name: Run tests with coverage
      run: |
        coverage run -m pytest -q
        coverage xml
        coverage report -m

    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
