name: Olympus CI

on:
  workflow_dispatch:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go reference verifier ────────────────────────────────────────────────────
  go-verifier:
    name: Go verifier conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: verifiers/go/go.sum

      - name: Run Go verifier tests
        working-directory: verifiers/go
        env:
          GOFLAGS: -mod=vendor
        run: go test ./... -v

  # ── Rust reference verifier ──────────────────────────────────────────────────
  rust-verifier:
    name: Rust verifier conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --no-self-update && rustup default stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: verifiers/rust -> target

      - name: Run Rust verifier tests
        working-directory: verifiers/rust
        run: cargo test

  # ── Rust verifier fuzz ───────────────────────────────────────────────────────
  cargo-fuzz-verifier:
    name: Cargo fuzz Olympus verifier (30 s per target)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        run: rustup toolchain install nightly --no-self-update

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: verifiers/rust -> target
          key: nightly

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz

      - name: Fuzz verify_merkle_proof (30 s)
        working-directory: verifiers/rust
        run: cargo +nightly fuzz run fuzz_verify_merkle_proof -- -max_total_time=30

      - name: Fuzz compute_merkle_root (30 s)
        working-directory: verifiers/rust
        run: cargo +nightly fuzz run fuzz_compute_merkle_root -- -max_total_time=30

  # ── Supply-chain audit (Rust + Node + Go only) ──────────────────────────────
  supply-chain:
    name: supply-chain (sbom + audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --no-self-update && rustup default stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.21

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Rust dependency vulnerability audit
        run: |
          IGNORE_ARGS=$(grep -v '^[[:space:]]*#' cargo-audit-baseline.txt | awk 'NF {printf "--ignore %s ", $1}')
          cargo audit --file Cargo.lock ${IGNORE_ARGS}
          cargo audit --file verifiers/rust/Cargo.lock ${IGNORE_ARGS}

      - name: Node.js dependency vulnerability audit
        run: |
          npm audit --prefix verifiers/javascript --audit-level=high
          npm audit --prefix app/public-ui --audit-level=high
          npm audit --prefix proofs --audit-level=critical

      - name: Set up Go for govulncheck
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Go dependency vulnerability audit (verifiers/go)
        run: govulncheck ./...
        working-directory: verifiers/go

  # ── Tauri desktop unit tests ─────────────────────────────────────────────────
  tauri-unit:
    name: tauri desktop unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo test (olympus-desktop)
        working-directory: src-tauri
        run: cargo test --lib --no-default-features -- --test-threads=4

  # ── Frontend type-check + Vite production build ──────────────────────────────
  frontend-build:
    name: frontend type-check + build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.1.2"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript type-check
        working-directory: app/public-ui
        run: pnpm exec tsc --noEmit

      - name: Vite production build
        working-directory: app/public-ui
        run: pnpm build
