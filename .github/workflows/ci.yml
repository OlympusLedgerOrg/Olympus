name: Olympus CI

on:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Database Strategy (see docs/08_database_strategy.md):
    # - PostgreSQL is the ONLY production backend
    # - CI uses Postgres to ensure production parity
    # - E2E tests (test_e2e_audit.py, test_storage.py) require Postgres
    # - API tests (test_api_proofs.py) use SQLite for proof logic only
    env:
      DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus
      TEST_DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: olympus
      PGPASSWORD: olympus
      PGDATABASE: olympus
    
    # PostgreSQL service for E2E and storage tests
    # Required by: test_e2e_audit.py, test_storage.py
    # NOT used by: test_api_proofs.py (uses temporary SQLite)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: olympus
          POSTGRES_PASSWORD: olympus
          POSTGRES_DB: olympus
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Validate JSON schemas
      run: python tools/validate_schemas.py

    - name: Run ruff linting
      run: |
        ruff check protocol/ storage/ api/ app/ tests/

    - name: Run mypy type checking
      run: |
        mypy protocol/ storage/ api/

    - name: Run pytest (fast lane - SQLite proof tests)
      run: |
        pytest tests/ -v --tb=short -m "not postgres"

    - name: Run pytest (Postgres lane - E2E and storage tests)
      run: |
        pytest tests/ -v --tb=short -m "postgres"
