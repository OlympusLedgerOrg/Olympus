name: Olympus CI

on:
  # Ensure manual reruns are possible from the UI
  workflow_dispatch:

  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

jobs:
  # Fast lane: Protocol and logic tests (no database required)
  # Runs ~201 tests covering cryptographic primitives, canonicalization, and proof logic
  fast-lane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -U setuptools
        pip install wheel
        pip install -e ".[dev]"

    - name: Show Python/pip/setuptools
      run: |
        python --version
        pip --version
        python - <<'PY'
        import setuptools, sys
        print("setuptools:", setuptools.__version__)
        PY

    - name: Validate JSON schemas
      run: python tools/validate_schemas.py

    - name: Run ruff linting
      run: |
        ruff check protocol/ storage/ api/ app/ tests/ --output-format=github

    - name: Run ruff formatting check
      run: |
        ruff format --check protocol/ storage/ api/ app/ tests/

    - name: Run mypy type checking
      run: |
        mypy protocol/ storage/ api/

    - name: Run bandit security scan
      run: |
        bandit -r protocol/ storage/ api/ app/ -f txt
      continue-on-error: true

    - name: Run pytest (fast lane - protocol and app tests) with coverage
      run: |
          pytest tests/ -v --tb=short -m "not postgres" \
            --cov=protocol --cov=app \
            --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=80

    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v3
      if: github.event_name == 'push'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      continue-on-error: true

  # Postgres lane: Storage layer and E2E tests (PostgreSQL required)
  # Runs ~17 tests covering production database layer and end-to-end flows
  postgres-lane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    # Database Strategy (see docs/08_database_strategy.md):
    # - PostgreSQL is the ONLY production backend
    # - These tests validate full ACID transaction guarantees
    # - Tests: test_e2e_audit.py, test_storage.py
    env:
      DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus
      TEST_DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: olympus
      PGPASSWORD: olympus
      PGDATABASE: olympus
    
    # PostgreSQL service for E2E and storage tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: olympus
          POSTGRES_PASSWORD: olympus
          POSTGRES_DB: olympus
        options: >-
          --health-cmd "pg_isready -U olympus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -U setuptools
        pip install wheel
        pip install -e ".[dev]"

    - name: Run pytest (postgres lane - storage and E2E tests)
      run: |
        pytest tests/ -v --tb=short -m "postgres"
