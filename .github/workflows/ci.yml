name: Olympus CI

on:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: olympus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run pytest
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/olympus_test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/olympus_test
      run: |
        pytest tests/ -v --tb=short
    
    - name: Run ruff
      run: |
        ruff check protocol/ storage/ api/ tests/
    
    - name: Run mypy
      run: |
        mypy protocol/ storage/ api/ --ignore-missing-imports
