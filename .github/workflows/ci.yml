name: Olympus CI

on:
  workflow_dispatch:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which areas of the repo changed ───────────────────────────────────
  # Every other job below conditions on these outputs so PRs only run the
  # checks they could plausibly break. Pure docs PRs skip everything heavy.
  # The "ci" filter forces all jobs to run whenever the workflow itself
  # changes, so workflow edits get full coverage.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust-app: ${{ steps.filter.outputs.rust-app }}
      rust-verifier: ${{ steps.filter.outputs.rust-verifier }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust-app:
              - 'src-tauri/**'
              - 'crates/**'
              - 'pg-embed-local/**'
              - 'migrations/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'proofs/keys/**'
              - 'proofs/vendor/**'
              - 'proofs/circuits/**'
              # Dev tooling that runs against the Rust build — broken hooks
              # or wrappers should fail CI before contributors hit them.
              - '.githooks/**'
              - 'scripts/**'
            rust-verifier:
              - 'verifiers/rust/**'
              - 'verifiers/test_vectors/**'
              - 'fuzz/**'
            frontend:
              - 'app/public-ui/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
            deps:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/package.json'
              - '**/pnpm-lock.yaml'
              - 'pnpm-lock.yaml'
              - 'cargo-audit-baseline.txt'
            ci:
              - '.github/workflows/ci.yml'

  # ── Rust reference verifier ──────────────────────────────────────────────────
  rust-verifier:
    name: Rust verifier conformance
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust-verifier == 'true' || needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --no-self-update && rustup default stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: verifiers/rust -> target

      - name: Run Rust verifier tests
        working-directory: verifiers/rust
        run: cargo test

  # ── Vendored light-poseidon provenance (audit L-20) ──────────────────────────
  # Fails CI if `crates/light-poseidon` has drifted from the upstream pinned
  # SHA outside the documented arkworks-version edits. See
  # `crates/light-poseidon/PROVENANCE.md` for the re-vendor procedure.
  light-poseidon-provenance:
    name: light-poseidon provenance check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust-app == 'true' || needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify vendored copy matches upstream pin
        run: bash scripts/check_light_poseidon_upstream.sh

  # ── Vendored circomlib provenance ────────────────────────────────────────────
  # Fails CI if `proofs/vendor/circomlib/circuits/` has drifted from the
  # pinned upstream `iden3/circomlib` tag. See
  # `proofs/vendor/circomlib/PROVENANCE.md` for the re-vendor procedure.
  circomlib-provenance:
    name: circomlib provenance check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust-app == 'true' || needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify vendored copy matches upstream pin
        run: bash scripts/check_circomlib_upstream.sh

  # ── Vendored glib-0.18.5-patched provenance (audit M-SC-1) ───────────────────
  # Fails CI if `crates/glib-0.18.5-patched/` has drifted from the published
  # `glib-0.18.5` crate beyond the documented GHSA-wrw7-89jp-8q8g backport.
  # This ~52k-LoC tree links into every Linux build; the other two vendored
  # trees (light-poseidon, circomlib) already have this gate. See
  # `crates/glib-0.18.5-patched/PROVENANCE.md` for the re-vendor procedure.
  glib-provenance:
    name: glib provenance check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust-app == 'true' || needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify vendored copy matches published crate
        run: bash scripts/check_glib_upstream.sh

  # ── Rust verifier fuzz ───────────────────────────────────────────────────────
  cargo-fuzz-verifier:
    name: Cargo fuzz Olympus verifier (30 s per target)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust-verifier == 'true' || needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        run: rustup toolchain install nightly --no-self-update

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: verifiers/rust -> target
          key: nightly

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz

      - name: Fuzz verify_merkle_proof (30 s)
        working-directory: verifiers/rust
        run: cargo +nightly fuzz run fuzz_verify_merkle_proof -- -max_total_time=30

      - name: Fuzz compute_merkle_root (30 s)
        working-directory: verifiers/rust
        run: cargo +nightly fuzz run fuzz_compute_merkle_root -- -max_total_time=30

  # ── Supply-chain audit (Rust + Node) ────────────────────────────────────────
  supply-chain:
    name: supply-chain (sbom + audit)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.deps == 'true' || needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --no-self-update && rustup default stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.21

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Rust dependency vulnerability audit
        run: |
          IGNORE_ARGS=$(grep -v '^[[:space:]]*#' cargo-audit-baseline.txt | awk 'NF {printf "--ignore %s ", $1}')
          # Audit M-SC-2: audit EVERY tracked lockfile, not just the workspace
          # + verifier roots. The fuzz-harness lockfiles (fuzz/,
          # verifiers/rust/fuzz/, services/cdhs-smf-rust/fuzz/) are dev-only and
          # not shipped, but the `deps` change-filter already triggers this job
          # on any `**/Cargo.lock` edit — so audit what we trigger on.
          while IFS= read -r lock; do
            echo "::group::cargo audit ${lock}"
            cargo audit --file "${lock}" ${IGNORE_ARGS}
            echo "::endgroup::"
          done < <(git ls-files '*Cargo.lock')

      - name: Node.js dependency vulnerability audit
        run: |
          npm audit --prefix verifiers/javascript --audit-level=high
          npm audit --prefix app/public-ui --audit-level=high
          npm audit --prefix proofs --audit-level=critical

      # ── License + source policy (deny.toml) ──────────────────────────────────
      # Machine-enforced version of THIRD_PARTY_LICENSES.md. Catches a new
      # dep with an unexpected license (GPL slipping into the Cargo graph,
      # an unknown registry, a wildcard version) before it ships.
      - name: Cache cargo-deny binary
        id: cache-cargo-deny
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-deny
          # Cache key MUST match the --version pin below — same pin invariant
          # as cargo-cyclonedx / cargo-mutants. Bump deliberately.
          key: cargo-deny-0.16.4

      - name: Install cargo-deny
        if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.16.4

      # `bans licenses sources` only — NOT `advisories`. Vulnerability /
      # advisory scanning is already done by `cargo audit` above; running it
      # again here is redundant, and cargo-deny 0.16.4's bundled rustsec
      # parser chokes on newer advisory-DB entries (e.g. RUSTSEC-2026-0035),
      # which is a tool-vs-DB version skew, not a real finding. Keep
      # cargo-deny focused on the policy it owns: licenses, bans, sources.
      - name: cargo deny check (workspace)
        run: cargo deny --all-features check bans licenses sources

      - name: cargo deny check (verifiers/rust)
        run: cargo deny --all-features --manifest-path verifiers/rust/Cargo.toml check bans licenses sources

      # ── SBOM generation (audit M-4) ──────────────────────────────────────────
      # SECURITY.md / threat-model.md claim SBOMs are produced; this is where
      # that claim actually becomes true. We emit CycloneDX SBOMs for every
      # consumer-facing artifact (Rust workspace, Rust verifier, JS frontend,
      # JS verifier, proofs ceremony tooling) and upload them as a single
      # workflow artifact. Release tooling can pull from the same run.
      - name: Cache cargo-cyclonedx binary
        id: cache-cyclonedx
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-cyclonedx
          # Cache key MUST match CARGO_CYCLONEDX_VERSION below — same
          # pin invariant as cargo-mutants in mutation-testing.yml.
          key: cargo-cyclonedx-0.5.9

      - name: Install cargo-cyclonedx
        if: steps.cache-cyclonedx.outputs.cache-hit != 'true'
        # Pin to the version implied by the cache key; unpinned
        # `cargo install` could store a newer release under a key that
        # claims a specific version, drifting silently across runs.
        # Bump deliberately when reviewing a newer cargo-cyclonedx
        # changelog.
        run: cargo install cargo-cyclonedx --locked --version 0.5.9

      - name: Generate Rust SBOMs (CycloneDX)
        run: |
          mkdir -p sbom
          # cargo-cyclonedx writes `<crate-name>.cdx.json` next to each
          # crate's Cargo.toml. `--override-filename` accepts only a
          # basename (no path separators) so we let the tool use the
          # natural per-crate names and gather the files afterwards.
          # Workspace pass — one SBOM per member crate.
          cargo cyclonedx --format json --all
          # verifiers/rust is workspace-excluded, generate separately.
          (cd verifiers/rust && cargo cyclonedx --format json)
          # Move every produced .cdx.json into sbom/. Restrict to the
          # known crate dirs so nothing under target/ leaks in. Use
          # `mv -n` (no-clobber) and explicitly fail the job if the
          # destination already exists — workspace crate names are
          # unique by Cargo enforcement so this is unreachable today,
          # but a silent overwrite would drop one crate's SBOM if a
          # future refactor ever broke that invariant. Better to surface
          # the collision loudly than ship an incomplete SBOM artifact.
          while IFS= read -r src; do
            dst="sbom/$(basename "$src")"
            if [ -e "$dst" ]; then
              echo "::error::SBOM filename collision at $dst (sources include $src)" >&2
              exit 1
            fi
            mv -n "$src" "$dst"
          done < <(find src-tauri crates pg-embed-local verifiers/rust \
                     -maxdepth 2 -name '*.cdx.json')

      - name: Generate Node SBOMs (CycloneDX)
        env:
          # Pin to a known-good release rather than `@latest` so an upstream
          # bump can't silently change SBOM output between CI runs. Bump
          # deliberately when reviewing a newer CycloneDX-npm changelog.
          CYCLONEDX_NPM_VERSION: "4.2.1"
        run: |
          mkdir -p sbom
          # We previously tried `npm sbom --sbom-format cyclonedx`, but it
          # aborts with ESBOMPROBLEMS on any package.json ↔ lockfile drift
          # (e.g. app/public-ui has `vite@8.0.14` in package.json but the
          # lockfile still resolves `esbuild@0.21.5`; vite 8.0.14 wants
          # `esbuild ^0.27.0 || ^0.28.0`). That's a real upstream drift
          # somebody should fix in a separate PR — it should NOT break
          # SBOM generation in CI.
          #
          # `@cyclonedx/cyclonedx-npm` (the official CycloneDX project's
          # tool) reads from the lockfile directly and is tolerant of
          # drift via `--ignore-npm-errors`. The SBOM it produces
          # describes exactly what the lockfile resolves to today, which
          # is the correct supply-chain-provenance contract — pin
          # esbuild@0.21.5 in the SBOM if that's what would actually be
          # installed, regardless of whether vite *wishes* it had newer.
          for pair in "app/public-ui:public-ui" \
                      "verifiers/javascript:verifier-javascript" \
                      "proofs:proofs-tooling"; do
            prefix="${pair%:*}"
            name="${pair#*:}"
            npx --yes "@cyclonedx/cyclonedx-npm@${CYCLONEDX_NPM_VERSION}" \
              --output-format JSON \
              --output-file "sbom/${name}.cdx.json" \
              --package-lock-only \
              --ignore-npm-errors \
              "$prefix/package.json"
          done

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom/
          retention-days: 90
          if-no-files-found: error

  # ── Tauri desktop unit tests ─────────────────────────────────────────────────
  tauri-unit:
    name: tauri desktop unit tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust-app == 'true' || needs.changes.outputs.ci == 'true'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        # Hardened against the apt hang that ate the full 6 h job budget on PR
        # #1058 (an Ubuntu mirror dropped a connection mid-fetch and apt blocked
        # forever waiting for the rest). Three lines of defense:
        #   1. step-level `timeout-minutes` caps the whole step at 10 min so a
        #      stuck apt can never consume the job's 6 h budget;
        #   2. `timeout N apt-get …` caps each individual apt invocation so a
        #      mirror-level stall surfaces as a non-zero exit, not a hang;
        #   3. retry loop on `apt-get update` (3 attempts) absorbs transient
        #      mirror flakes without re-running the whole job.
        # DEBIAN_FRONTEND=noninteractive + APT_LISTCHANGES_FRONTEND=none make
        # sure no postinst can ever pop a prompt (which would also hang).
        timeout-minutes: 10
        env:
          DEBIAN_FRONTEND: noninteractive
          APT_LISTCHANGES_FRONTEND: none
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if sudo -E timeout 240 apt-get update -o Acquire::Retries=3; then
              break
            fi
            echo "apt-get update attempt $i failed; sleeping 5 s"
            sleep 5
            if [ "$i" = "3" ]; then
              echo "apt-get update failed 3 times — aborting"
              exit 1
            fi
          done
          sudo -E timeout 300 apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js (for ceremony npm tooling)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: ZK ceremony artifacts (cached)
        uses: ./.github/actions/zk-ceremony-artifacts

      # `--tests` runs both lib unit tests AND integration tests in
      # src-tauri/tests/. With ceremony artifacts present from the step
      # above, the zk_prove_*.rs tests exercise full Groth16 prove + verify
      # round-trips; otherwise they exit-clean.
      - name: cargo test (olympus-desktop, default features = prover)
        working-directory: src-tauri
        # `zk-test-utils` exposes the audit-M-5 escape hatches on
        # `CircomProvingKey` needed by `tests/zk_prove_existence.rs`'s
        # #1011 side-by-side parity diagnostic. The feature is OFF by
        # default so production builds can't peel the newtype seal off;
        # opt in here so CI runs the full prove/verify roundtrip + the
        # diagnostic.
        run: cargo test --tests --features zk-test-utils -- --test-threads=4

  # ── Frontend type-check + Vite production build ──────────────────────────────
  frontend-build:
    name: frontend type-check + build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.1.2"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript type-check
        working-directory: app/public-ui
        run: pnpm exec tsc --noEmit

      - name: Vite production build
        working-directory: app/public-ui
        run: pnpm build
