name: Olympus Smoke Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-unit:
    name: smoke (unit, no-db)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements-dev.txt
        pip install -e . --no-deps

    - name: Verify import boundaries
      run: python tools/check_import_boundaries.py

    - name: Validate JSON schemas
      run: python tools/validate_schemas.py

    - name: Ruff lint
      run: ruff check protocol/ storage/ api/ app_testonly/ tests/ --output-format=github

    - name: Ruff format check
      run: ruff format --check protocol/ storage/ api/ app_testonly/ tests/

    - name: MyPy type check
      run: mypy protocol/ storage/ api/

    - name: Run smoke tests (unit, no database)
      run: pytest tests/ -v --tb=short -m "smoke and not postgres"

  smoke-integration:
    name: smoke (postgres integration)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus
      TEST_DATABASE_URL: postgresql://olympus:olympus@localhost:5432/olympus
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: olympus
      PGPASSWORD: olympus
      PGDATABASE: olympus
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: olympus
          POSTGRES_PASSWORD: olympus
          POSTGRES_DB: olympus
        options: >-
          --health-cmd "pg_isready -U olympus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements-dev.txt
        pip install -e . --no-deps

    - name: Apply database migrations
      run: |
        for migration in $(ls migrations/*.sql | sort); do
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
        done

    - name: Run smoke tests (PostgreSQL integration)
      run: pytest tests/test_e2e_audit.py -v --tb=short
