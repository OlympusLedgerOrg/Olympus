name: Mutation Testing

# Nightly mutation testing pass over the Rust crypto crate.
#
# Audit follow-up: this workflow previously ran `mutmut` against
# `protocol/hashes.py`, `protocol/merkle.py`, `protocol/ssmf.py`, and
# `protocol/canonical.py` — all retired with the Python FastAPI server in
# v0.9.0. The center of gravity is now `crates/olympus-crypto`, which is
# parity-locked against `light-poseidon` and consumed by the Tauri Axum
# backend. ADR-0002 acknowledges this migration.

on:
  workflow_dispatch:
  schedule:
    # Run nightly at 03:00 UTC — mutation testing is expensive
    - cron: "0 3 * * *"
  pull_request:
    paths:
      # Restrict PR-triggered mutation runs to files inside the two
      # mutation scopes plus this workflow itself. Unrelated PRs don't
      # pay the cost. Each job still runs on every PR matching this
      # union — gating per-job by which-path-actually-changed would
      # need a paths-filter action; keeping it simple here, the cache
      # hit on the unaffected job keeps it cheap in practice.
      - "crates/olympus-crypto/**"
      - "src-tauri/src/zk/**"
      - ".github/workflows/mutation-testing.yml"
      - ".github/actions/zk-ceremony-artifacts/**"

concurrency:
  group: mutation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation-test-crypto:
    name: cargo-mutants — olympus-crypto
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Mutation testing builds + tests every mutation in series; for the
    # current ~220-mutant surface (lib.rs + poseidon.rs + canonical.rs +
    # smt.rs + ledger_snapshot.rs) on a `ubuntu-latest` runner this
    # comfortably fits in 90 minutes. Bump if the crate grows.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the PR-diff step below can compute a merge-base
          # against the target branch for `--in-diff`.
          fetch-depth: 0

      - name: Scope mutation run to the PR diff (pull_request only)
        # On PRs, only mutate the lines this PR actually changed. The nightly
        # `schedule` / manual `workflow_dispatch` runs skip this step and do a
        # full pass. Turns an unrelated-to-this-job PR (e.g. one touching a zk
        # file but not olympus-crypto) into a near-instant no-op instead of a
        # full ~90-minute mutation sweep.
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${GITHUB_BASE_REF}"
          base_sha="$(git merge-base FETCH_HEAD HEAD)"
          git diff "${base_sha}" HEAD > pr.diff
          echo "Scoping cargo-mutants to PR diff vs ${GITHUB_BASE_REF} (${base_sha}):"
          git --no-pager diff --stat "${base_sha}" HEAD || true
          echo "MUTANTS_IN_DIFF=--in-diff pr.diff" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Cache cargo-mutants binary
        id: cache-cargo-mutants
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-mutants
          # Cache key MUST match CARGO_MUTANTS_VERSION below so a cache
          # miss installs the same version that's stored under this key.
          key: cargo-mutants-27.0.0

      - name: Install cargo-mutants
        if: steps.cache-cargo-mutants.outputs.cache-hit != 'true'
        # Pin to the version implied by the cache key; an unpinned
        # `cargo install` could store a newer release under a key that
        # claims a specific version, drifting silently on subsequent
        # runs.
        run: cargo install cargo-mutants --locked --version 27.0.0

      - name: Run mutation testing (olympus-crypto)
        run: |
          # Enable every feature with tests so the per-mutation test command
          # is the same one a developer runs locally.
          # `--no-shuffle` keeps the run order deterministic so reruns of a
          # specific mutation can be reproduced from the same line numbers.
          # `--timeout 90` caps any single mutation's test run at 90 s
          # (default 60 s is borderline tight under CI runner CPU contention).
          #
          # cargo-mutants exit code contract (per its docs):
          #   0  — all mutants caught (or no mutants found)
          #   1  — usage error / internal error
          #   2  — one or more mutants survived (informational; not a hard
          #        regression — fix lands in a separate test PR)
          #   3+ — failed to build, timeout, cargo error
          #
          # The previous `|| true` masked everything, including real
          # tooling failures. Treat 0 and 2 as success; surface anything
          # else as a CI failure.
          set +e
          # ${MUTANTS_IN_DIFF} is `--in-diff pr.diff` on pull_request runs
          # (set by the "Scope mutation run to the PR diff" step) and empty
          # on scheduled/dispatch runs, which therefore do a full pass.
          cargo mutants \
            -p olympus-crypto \
            --features poseidon,smt,snapshot,canonical \
            --no-shuffle \
            --timeout 90 \
            ${MUTANTS_IN_DIFF:-}
          rc=$?
          set -e
          case "$rc" in
            0|2) echo "cargo mutants exit=$rc (acceptable)" ;;
            *)   echo "cargo mutants exit=$rc — failing the job"; exit "$rc" ;;
          esac

          # Catch the silent-pass failure mode where every mutant is unviable
          # (couldn't build). cargo-mutants exits 0 with a WARN; without this
          # guard the gate goes green while testing zero behaviour. Trigger
          # cases include workspace breakage during the per-mutant rebuild
          # (scratch-dir issue, missing system dep, broken feature combo).
          #
          # Source of truth is outcomes.json. The schema is one outcome per
          # mutant with a `summary` of "Success" | "CaughtMutant" |
          # "MissedMutant" | "Unviable" | "Timeout" | …. A viable mutant is
          # anything other than Unviable on the in-diff scope; if zero
          # viable mutants ran, the gate failed to validate anything.
          if [ -f mutants.out/outcomes.json ]; then
            # Filter to actual Mutant scenarios — `.outcomes` also contains
            # the Baseline scenario (a "Success" outcome that's not a mutant
            # at all), and counting it as viable would mask the very failure
            # mode this guard exists to catch.
            mutants_jq='[.outcomes[] | select(.scenario | type == "object" and has("Mutant"))]'
            total=$(jq "${mutants_jq} | length" mutants.out/outcomes.json 2>/dev/null || echo 0)
            viable=$(jq "${mutants_jq} | map(select(.summary != \"Unviable\")) | length" \
                       mutants.out/outcomes.json 2>/dev/null || echo 0)
            echo "outcomes: ${total} mutants, ${viable} viable (non-Unviable)"
            if [ "$total" -gt 0 ] && [ "$viable" -eq 0 ]; then
              echo "::error::cargo-mutants found ${total} mutants but ALL were unviable — gate validated nothing. Likely a per-mutant build failure (scratch-dir, missing dep, broken feature). See mutants-out artifact, mutants.out/log/* for the actual build errors."
              exit 1
            fi
          fi

      - name: Summarise mutation results
        if: always()
        run: |
          echo "## Mutation Testing — olympus-crypto" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f mutants.out/outcomes.json ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.outcomes | group_by(.scenario.outcome)[] | "\(.[0].scenario.outcome): \(length)"' \
              mutants.out/outcomes.json 2>/dev/null \
              >> "$GITHUB_STEP_SUMMARY" \
              || cat mutants.out/outcomes.json | head -50 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No `mutants.out/outcomes.json` produced — the run probably bailed early._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload mutants.out
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-out
          path: mutants.out/
          retention-days: 30
          if-no-files-found: warn

      - name: Flag surviving mutants
        if: always()
        run: |
          # Informational: count survivors. Don't fail CI — survivors are
          # triage signals, not hard regressions. The fix is a new test that
          # would have killed the mutation, landed in a separate PR.
          if [ -f mutants.out/caught.txt ] && [ -f mutants.out/missed.txt ]; then
            caught=$(wc -l < mutants.out/caught.txt || echo 0)
            missed=$(wc -l < mutants.out/missed.txt || echo 0)
            echo "Caught: $caught   Missed: $missed"
            if [ "$missed" -gt 0 ]; then
              echo "::warning::$missed mutant(s) survived — see mutants-out artifact, mutants.out/missed.txt"
            fi
          fi

  mutation-test-zk:
    name: cargo-mutants — src-tauri zk module
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # The zk prover surface is heavier than olympus-crypto: each per-mutant
    # test cycle loads multi-MB `.ark.zkey` proving keys and runs the WASM
    # witness generator end-to-end. `prove.rs` alone produces ~114 mutants
    # (`cargo mutants --list --file ...`); at ~30 s per cycle that's ~60
    # minutes for prove.rs and another ~20 minutes for the rest of the zk
    # module. 180 minutes leaves headroom for CI runner CPU contention.
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the PR-diff step below can compute a merge-base
          # against the target branch for `--in-diff`.
          fetch-depth: 0

      - name: Scope mutation run to the PR diff (pull_request only)
        # On PRs, only mutate the lines this PR changed. Combined with the
        # `--file src-tauri/src/zk/prove.rs` scope below, a PR that touches a
        # zk file other than prove.rs (e.g. baby_jubjub.rs) yields zero
        # mutants and returns in seconds instead of the full ~3-hour sweep.
        # The nightly `schedule` / `workflow_dispatch` runs skip this and do
        # the full prove.rs pass.
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${GITHUB_BASE_REF}"
          base_sha="$(git merge-base FETCH_HEAD HEAD)"
          git diff "${base_sha}" HEAD > pr.diff
          echo "Scoping cargo-mutants to PR diff vs ${GITHUB_BASE_REF} (${base_sha}):"
          git --no-pager diff --stat "${base_sha}" HEAD || true
          echo "MUTANTS_IN_DIFF=--in-diff pr.diff" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps for src-tauri
        # src-tauri depends on libsoup/javascriptcoregtk/webkit2gtk for the
        # Tauri webview build, plus pkg-config to resolve them. The
        # mutation runs `cargo build`/`cargo test` per mutant, both of
        # which need these to link successfully.
        #
        # See ci.yml for the apt-hardening rationale (step-level timeout +
        # per-invocation timeout + retry loop).
        timeout-minutes: 10
        env:
          DEBIAN_FRONTEND: noninteractive
          APT_LISTCHANGES_FRONTEND: none
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if sudo -E timeout 240 apt-get update -o Acquire::Retries=3; then
              break
            fi
            echo "apt-get update attempt $i failed; sleeping 5 s"
            sleep 5
            if [ "$i" = "3" ]; then
              echo "apt-get update failed 3 times — aborting"
              exit 1
            fi
          done
          sudo -E timeout 300 apt-get install -y \
            pkg-config libssl-dev \
            libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Cache cargo-mutants binary
        id: cache-cargo-mutants
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-mutants
          key: cargo-mutants-27.0.0

      - name: Install cargo-mutants
        if: steps.cache-cargo-mutants.outputs.cache-hit != 'true'
        run: cargo install cargo-mutants --locked --version 27.0.0

      - name: Restore (or build) ZK ceremony artifacts
        # Each per-mutant test run executes the zk_prove_*.rs integration
        # tests, which load proofs/build/<circuit>_final.ark.zkey at
        # runtime. Without this step they `eprintln!("[skip] artifacts
        # missing")` and return Ok — silently turning every mutation into
        # a false negative. The composite action restores from cache when
        # possible, falling back to a full ptau20 ceremony rebuild.
        uses: ./.github/actions/zk-ceremony-artifacts

      - name: Run mutation testing (src-tauri zk module)
        run: |
          # Scope tightly to `prove.rs` — that's the file the #1011 fix
          # landed on and the one PR-time mutation coverage is intended
          # to guard. Broaden to the rest of `src-tauri/src/zk/**`
          # (witness/, verify.rs, snapshot.rs, …) once the prove.rs run
          # is reliably fitting inside the 180-minute timeout.
          #
          # IMPORTANT — cargo-mutants does NOT mutate generic type
          # arguments. The class of bug fixed in #1011 — `Groth16::<E>`
          # silently defaulting to `LibsnarkReduction` instead of
          # `CircomReduction` — is structurally invisible to this tool.
          # The clippy `disallowed_methods` guard in `clippy.toml` is
          # what catches that bug class; this mutation job complements
          # it by catching body-level / operator-level regressions in
          # the prover surface (function bodies replaced with default
          # returns, boolean negations, arithmetic operator swaps).
          # IMPORTANT — the `quorum-circuit` feature MUST be enabled here.
          # `prove_quorum` is gated behind it; with only `--features prover`
          # the function is cfg-excluded, so a mutation of its body still
          # builds + tests green and cargo-mutants reports a meaningless
          # MISSED "survivor" against code that was never compiled. Its
          # *artifact-dependent* prove path stays unkillable until the
          # federation_quorum trusted-setup ceremony produces a real
          # `.ark.zkey` (same status as the unified circuit) — the
          # whole-body mutant is killed by an invalid-witness unit test that
          # exercises the native pre-check without artifacts.
          set +e
          # ${MUTANTS_IN_DIFF} is `--in-diff pr.diff` on pull_request runs
          # (intersected with the --file scope below) and empty on
          # scheduled/dispatch runs, which do the full prove.rs pass.
          cargo mutants \
            -p olympus-desktop \
            --file src-tauri/src/zk/prove.rs \
            --no-default-features \
            --features prover,quorum-circuit \
            --no-shuffle \
            --timeout 180 \
            ${MUTANTS_IN_DIFF:-}
          rc=$?
          set -e
          case "$rc" in
            0|2) echo "cargo mutants exit=$rc (acceptable)" ;;
            *)   echo "cargo mutants exit=$rc — failing the job"; exit "$rc" ;;
          esac

          # Catch the silent-pass failure mode where every mutant is
          # unviable. The zk job is especially prone to this — per-mutant
          # rebuilds load `.ark.zkey` artifacts and link against system
          # webkit/gtk, so a missing dep, an interrupted ceremony-artifact
          # restore, or a feature-flag drift can turn all N mutants into
          # build failures while cargo-mutants still exits 0. See the
          # equivalent guard in the crypto job above.
          if [ -f mutants.out/outcomes.json ]; then
            # Filter to actual Mutant scenarios — `.outcomes` also contains
            # the Baseline scenario (a "Success" outcome that's not a mutant
            # at all), and counting it as viable would mask the very failure
            # mode this guard exists to catch.
            mutants_jq='[.outcomes[] | select(.scenario | type == "object" and has("Mutant"))]'
            total=$(jq "${mutants_jq} | length" mutants.out/outcomes.json 2>/dev/null || echo 0)
            viable=$(jq "${mutants_jq} | map(select(.summary != \"Unviable\")) | length" \
                       mutants.out/outcomes.json 2>/dev/null || echo 0)
            echo "outcomes: ${total} mutants, ${viable} viable (non-Unviable)"
            if [ "$total" -gt 0 ] && [ "$viable" -eq 0 ]; then
              echo "::error::cargo-mutants found ${total} mutants but ALL were unviable — gate validated nothing. Likely a per-mutant build failure (scratch-dir, missing dep, ZK artifacts not restored). See mutants-out-zk artifact, mutants.out/log/* for the actual build errors."
              exit 1
            fi
          fi

      - name: Summarise mutation results
        if: always()
        run: |
          echo "## Mutation Testing — src-tauri zk" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f mutants.out/outcomes.json ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.outcomes | group_by(.scenario.outcome)[] | "\(.[0].scenario.outcome): \(length)"' \
              mutants.out/outcomes.json 2>/dev/null \
              >> "$GITHUB_STEP_SUMMARY" \
              || cat mutants.out/outcomes.json | head -50 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No `mutants.out/outcomes.json` produced — the run probably bailed early._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload mutants.out
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-out-zk
          path: mutants.out/
          retention-days: 30
          if-no-files-found: warn

      - name: Flag surviving mutants
        if: always()
        run: |
          if [ -f mutants.out/caught.txt ] && [ -f mutants.out/missed.txt ]; then
            caught=$(wc -l < mutants.out/caught.txt || echo 0)
            missed=$(wc -l < mutants.out/missed.txt || echo 0)
            echo "Caught: $caught   Missed: $missed"
            if [ "$missed" -gt 0 ]; then
              echo "::warning::$missed mutant(s) survived in src-tauri zk — see mutants-out-zk artifact"
            fi
          fi
