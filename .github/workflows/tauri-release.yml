name: Tauri Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          # `toolchain` is required when the action is pinned to a SHA (the
          # `@stable` tag magic that infers it is lost on a commit pin). Without
          # this the step fails instantly with "'toolchain' is a required input"
          # on every platform — which is why release bundles never built.
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: ". -> target"

      - name: Install pnpm
        # No `version:` — the action reads packageManager (pnpm@11.x) from
        # package.json. Passing an explicit version conflicts and errors with
        # "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        # See ci.yml for the apt-hardening rationale (step-level timeout +
        # per-invocation timeout + retry loop).
        timeout-minutes: 10
        env:
          DEBIAN_FRONTEND: noninteractive
          APT_LISTCHANGES_FRONTEND: none
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if sudo -E timeout 240 apt-get update -o Acquire::Retries=3; then
              break
            fi
            echo "apt-get update attempt $i failed; sleeping 5 s"
            sleep 5
            if [ "$i" = "3" ]; then
              echo "apt-get update failed 3 times — aborting"
              exit 1
            fi
          done
          sudo -E timeout 300 apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Generate icons from source SVG
        run: cargo tauri icon src-tauri/icons/source.svg

      # NOTE: no test step here. A release/bundle workflow should only build
      # artifacts; tests are gated by ci.yml (x86) and macos-ci.yml (arm64 +
      # intel). Running `cargo test` here also ran NATIVE-host tests, so on the
      # arm64 macOS runners it executed the aarch64 suite regardless of the
      # x86_64 target — blocking the (working) x86_64 bundle on an arm64-only
      # failure. Keep test coverage in the CI workflows where it belongs.

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows EV code-signing — configure TAURI_SIGNING_PRIVATE_KEY and
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD in repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization. Gated on tag releases only:
          # tauri-action attempts a `security import` of APPLE_CERTIFICATE
          # whenever it's non-empty, which fails (exit 1) when the secret is an
          # unconfigured placeholder. On workflow_dispatch / branch builds these
          # resolve to "" so tauri-action skips signing and emits an UNSIGNED
          # bundle (fine for testing — recipients use right-click→Open or
          # `xattr -cr <App>`). On a `v*` tag the real secrets flow through and
          # the bundle is signed/notarized (once the APPLE_* secrets are set).
          APPLE_ID: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_TEAM_ID || '' }}
          APPLE_CERTIFICATE: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
        with:
          target: ${{ matrix.target }}
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: olympus-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
