name: CodeQL Security Analysis

on:
  workflow_dispatch:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          # Audit finding M-3: Rust is now the main trusted computing base
          # (Axum API, auth, ZK, DB, federation, anchoring). Run CodeQL over
          # the workspace so semantic static analysis catches the same
          # vulnerability classes it catches in the TS frontend.
          #
          # `build-mode: none` is the only mode the GA Rust extractor
          # currently supports (codeql 2.25.x rejects `manual` with
          # "Rust does not support the manual build mode"). The extractor
          # parses sources directly, so the GTK system deps that the
          # `tauri-unit` job installs are not needed here.
          - language: rust
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
