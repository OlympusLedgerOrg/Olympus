name: macOS CI

# Compile + unit-test on real macOS runners so PRs catch Mac-specific breakage
# early (ci.yml is Ubuntu-only). This does NOT run the pg_embed integration
# tests (tests/*_db.rs): they download a PostgreSQL binary at runtime and are
# timing-flaky in CI — that coverage stays on the Linux/Windows jobs. For a full
# downloadable .dmg bundle, use tauri-release.yml (workflow_dispatch), which this
# job intentionally does not duplicate.
#
# Cost control (each macOS leg is a ~45-min cold compile of arkworks + tauri +
# sqlx; rust-cache only helps warm runs):
#   * Docs-only changes are skipped via `paths-ignore` below.
#   * Draft PRs are skipped via the `setup` job's `if` guard.
#   * Pull requests build a SINGLE arch (arm64 / Apple Silicon) — see the
#     `setup` job, which emits a one-entry matrix for `pull_request` and the
#     full two-arch matrix for push-to-main / manual dispatch. So branch work
#     pays for one macOS leg per push; Intel (x86_64) coverage runs on merge to
#     main and on demand. These jobs are not required status checks, so the
#     reduced PR matrix does not block merges.

on:
  # Run on pushes to main and on pull requests. Push is scoped to `main` (like
  # ci.yml / codeql.yml / coverage.yml) so branch work is covered once via the
  # PR event and main pushes once via push — the concurrency group below can't
  # dedupe a push and its PR because they carry different `github.ref`s.
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  # Key on the PR head branch when present (`head_ref`) and the pushed ref
  # otherwise, so a push and its PR collapse into one group and don't run twice.
  group: macos-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only resolves a matrix + checks out
# and builds/tests PR-controlled code (pnpm/cargo), so it needs read access to
# repo contents and nothing else — every unlisted scope is implicitly `none`.
# Matches the per-job `permissions: contents: read` convention in ci.yml.
permissions:
  contents: read

jobs:
  # Resolve the build matrix and gate drafts. Cheap (~seconds on ubuntu) so it
  # adds no meaningful latency. Pull requests get one arch; everything else gets
  # both. Draft PRs skip here, which cascades to `macos` via `needs`.
  setup:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Resolve matrix
        id: matrix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PRs: single arch (arm64) to halve macOS cost.
            echo 'matrix={"include":[{"os":"macos-14","target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
          else
            # main push / manual dispatch: full coverage (arm64 + Intel).
            echo 'matrix={"include":[{"os":"macos-14","target":"aarch64-apple-darwin"},{"os":"macos-15-intel","target":"x86_64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
          fi

  macos:
    needs: setup
    strategy:
      fail-fast: false
      # macos-14 = Apple Silicon (arm64); macos-15-intel = Intel (x86_64);
      # macos-13 reached EOL 2025-12-04. The exact entries are chosen by `setup`.
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: build+test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Don't leave the job token in git config while running PR-controlled
          # build/test commands (pnpm/cargo) after checkout.
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          # `toolchain` is required when the action is pinned to a SHA (the
          # `@stable` tag magic that infers it is lost on a commit pin).
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: ". -> target"

      - name: Install pnpm
        # No `version:` — the action reads packageManager (pnpm@11.x) from
        # package.json. Passing an explicit version conflicts and errors with
        # "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Frontend build
        run: pnpm --filter public-ui build

      # Build the desktop crate with the same feature set the app uses
      # (`cargo tauri dev` → --no-default-features --features prover). build.rs
      # drops PLACEHOLDER ZK artifacts so this compiles without the circuit
      # ceremony — runtime ZK prove/verify still needs setup_circuits.sh.
      - name: Build olympus-desktop
        run: cargo build -p olympus-desktop --no-default-features --features prover --target ${{ matrix.target }}

      # Pure, DB-free unit tests: cross-impl crypto conformance + the desktop
      # crate's lib unit tests (canonicalization, leaf/SMT hashing, auth scope
      # mapping, ingest signing-key derivation, …). Host == target for both
      # matrix legs, so these run natively.
      - name: Unit tests (olympus-crypto)
        run: cargo test -p olympus-crypto --all-features

      - name: Unit tests (olympus-desktop lib)
        run: cargo test -p olympus-desktop --no-default-features --features prover --lib
