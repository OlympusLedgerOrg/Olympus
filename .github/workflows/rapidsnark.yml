name: "Optional ZK: RapidSNARK"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/rapidsnark.yml"
      - "proofs/**"
      - "protocol/groth16_backend.py"
      - "tests/test_groth16_backend.py"
      - "tests/test_snarkjs_bridge.py"

concurrency:
  group: rapidsnark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rapidsnark-linux-x86-64:
    name: "RapidSNARK optional backend (Linux x86-64)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      OLYMPUS_ENABLE_RAPIDSNARK: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Guard supported platform
        run: |
          set -euo pipefail
          if [ "$(uname -s)" != "Linux" ] || [ "$(uname -m)" != "x86_64" ]; then
            echo "RapidSNARK job only runs on Linux x86_64; got $(uname -s) $(uname -m)."
            exit 0
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: proofs/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps

      - name: Install RapidSNARK build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            g++ \
            libgmp-dev \
            libsodium-dev \
            nasm \
            pkg-config

      - name: Install proofs JS dependencies
        run: npm ci --ignore-scripts --prefix proofs

      - name: Build RapidSNARK
        run: |
          set -euo pipefail
          git clone --recursive https://github.com/MystenLabs/rapidsnark.git /tmp/rapidsnark
          cd /tmp/rapidsnark
          npm install
          git submodule update --init --recursive
          npx task createFieldSources
          npx task buildProver
          test -x /tmp/rapidsnark/build/prover
          sudo cp /tmp/rapidsnark/build/prover /usr/local/bin/rapidsnark
          rapidsnark --version 2>/dev/null || echo "rapidsnark installed successfully"

      - name: Verify optional backend detection
        run: |
          python - <<'PY'
          from proofs import snarkjs_bridge
          from protocol.groth16_backend import Groth16Backend

          assert snarkjs_bridge.rapidsnark_unavailable_reason() is None
          assert snarkjs_bridge._resolve_rapidsnark_path() is not None
          assert Groth16Backend.rapidsnark_unavailable_reason() is None
          assert Groth16Backend._resolve_rapidsnark_path() is not None
          PY

      - name: Run RapidSNARK routing tests
        run: |
          pytest tests/test_snarkjs_bridge.py::TestBridgeAvailability \
                 tests/test_groth16_backend.py::TestResolveRapidsnarkPath \
                 tests/test_groth16_backend.py::TestRapidsnarkFallback \
                 -q
