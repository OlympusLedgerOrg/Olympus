name: Mirror postgres:16 -> GHCR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # daily at 04:00 UTC; adjust if needed

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull upstream postgres image
        run: docker pull postgres:16

      - name: Tag and push to GHCR
        run: |
          TARGET=ghcr.io/${{ github.repository_owner }}/postgres:16
          docker tag postgres:16 $TARGET
          docker push $TARGET

      - name: Also tag as :latest (optional)
        run: |
          TARGET_LATEST=ghcr.io/${{ github.repository_owner }}/postgres:latest
          docker tag postgres:16 $TARGET_LATEST
          docker push $TARGET_LATEST
