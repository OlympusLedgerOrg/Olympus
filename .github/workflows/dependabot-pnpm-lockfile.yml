name: Dependabot pnpm lockfile

# Dependabot's npm ecosystem updates package.json but cannot refresh
# pnpm-lock.yaml, so every JS bump lands with a stale lockfile and CI's
# `pnpm install --frozen-lockfile` step fails. This workflow runs on
# dependabot PRs that touch a workspace package.json, regenerates the
# lockfile, and pushes it back to the PR branch.
#
# pull_request_target runs in the base repo context with write access,
# which is required to push to the PR head. The `actor == dependabot[bot]`
# guard plus the `--lockfile-only` install (which does not execute install
# scripts) keeps this safe against arbitrary PR contents.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'app/public-ui/package.json'
      - 'verifiers/javascript/package.json'
      - 'proofs/package.json'
      - 'package.json'

jobs:
  refresh-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.1.2"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Refresh pnpm lockfile
        run: pnpm install --lockfile-only --ignore-scripts

      - name: Commit and push if lockfile changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$(git status --porcelain pnpm-lock.yaml)" ]; then
            echo "pnpm-lock.yaml already up to date."
            exit 0
          fi
          git config user.name "dependabot-pnpm-lockfile[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore(deps): refresh pnpm-lock.yaml"
          git push
          # GITHUB_TOKEN pushes do not trigger downstream workflow runs;
          # close+reopen the PR so required checks re-evaluate the new SHA.
          gh pr close "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
          gh pr reopen "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
