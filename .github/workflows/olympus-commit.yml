name: Commit to Olympus

# NOTE: This workflow fires ONLY on GitHub releases (not on push/PR).
# It does NOT gate merges to main. Its purpose is to anchor release artifacts
# to the Olympus ledger for public provenance. Failure here means the release
# wasn't anchored, not that the code is broken. A human should re-run it.
#
# If OLYMPUS_API_URL is not configured, the anchoring step is skipped with a
# notice rather than failing the workflow. OLYMPUS_API_KEY is optional because
# the node may be configured for keyless/no-auth deployments.

on:
  release:
    types: [published]

jobs:
  olympus-commit:
    name: Anchor release artifacts to Olympus
    runs-on: ubuntu-latest

    permissions:
      contents: write # required to update release notes

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "clients/cli -> clients/cli/target"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          gh release download "$REF_NAME" --dir release-assets || true
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Check Olympus API is configured
        id: api-check
        env:
          OLYMPUS_API_URL: ${{ vars.OLYMPUS_API_URL }}
        run: |
          if [ -z "${OLYMPUS_API_URL:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Olympus API URL not configured — skipping artifact anchoring"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release artifact manifest
        id: manifest
        env:
          GH_REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          if ! find release-assets -type f | grep -q .; then
            echo "::notice::No release assets found — skipping Olympus release manifest"
            echo "manifest_built=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cargo run --manifest-path clients/cli/Cargo.toml -- build \
            --data release-assets \
            --dataset-id "${GH_REPOSITORY}/${REF_NAME}/release-assets" \
            --version "${RUN_NUMBER}" \
            --shard release-assets \
            --name "Olympus release ${REF_NAME}" \
            --description "Release artifacts, checksums, and SBOM assets for ${GH_REPOSITORY} ${REF_NAME}" \
            --source "${SERVER_URL}/${GH_REPOSITORY}/releases/tag/${REF_NAME}" \
            --out release-manifest.json \
            --index release-index.json

          echo "manifest_built=true" >> "$GITHUB_OUTPUT"
          manifest_root=$(python3 - <<'PY'
          import json
          print(json.load(open("release-manifest.json"))["manifest_root"])
          PY
          )
          echo "manifest_root=${manifest_root}" >> "$GITHUB_OUTPUT"

      - name: Upload release manifest artifacts
        if: steps.manifest.outputs.manifest_built == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: olympus-release-manifest
          path: |
            release-manifest.json
            release-index.json
          if-no-files-found: error

      - name: Commit release manifest to Olympus
        id: olympus
        if: steps.api-check.outputs.configured == 'true' && steps.manifest.outputs.manifest_built == 'true'
        continue-on-error: true
        env:
          OLYMPUS_API_URL: ${{ vars.OLYMPUS_API_URL }}
          OLYMPUS_API_KEY: ${{ secrets.OLYMPUS_API_KEY }}
        run: |
          set -euo pipefail

          API_URL="${OLYMPUS_API_URL:-https://api.olympus.example.com}"

          args=(run --manifest-path clients/cli/Cargo.toml --features server -- commit
            --manifest release-manifest.json
            --server "$API_URL"
            --shard release-manifests)
          if [ -n "${OLYMPUS_API_KEY:-}" ]; then
            args+=(--api-key "$OLYMPUS_API_KEY")
          fi

          cargo "${args[@]}" | tee olympus-commit-output.txt
          {
            echo 'node_response<<EOF'
            grep 'node response:' olympus-commit-output.txt | sed 's/^.*node response: //'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Warn if Olympus commitment failed
        if: steps.olympus.outcome == 'failure'
        run: echo "::warning::Olympus commitment failed — release not anchored"

      - name: Add release manifest commitment to release notes
        if: steps.olympus.outcome == 'success' && steps.olympus.outputs.node_response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          MANIFEST_ROOT: ${{ steps.manifest.outputs.manifest_root }}
        run: |
          NODE_RESPONSE='${{ steps.olympus.outputs.node_response }}'
          EXISTING_NOTES=$(gh release view "$REF_NAME" --json body -q '.body // ""')

          NOTES_APPEND=$(printf '## Olympus Provenance\n\nRelease manifest root: `%s`\n\nNode response:\n\n```json\n%s\n```\n\nThe release-asset manifest has been anchored to the [Olympus](https://github.com/OlympusLedgerOrg/Olympus) ledger.' "${MANIFEST_ROOT}" "${NODE_RESPONSE}")

          printf '%s\n\n%s\n' "${EXISTING_NOTES}" "${NOTES_APPEND}" > /tmp/updated-notes.txt
          gh release edit "$REF_NAME" --notes-file /tmp/updated-notes.txt
