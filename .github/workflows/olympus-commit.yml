name: Commit to Olympus

# NOTE: This workflow fires ONLY on GitHub releases (not on push/PR).
# It does NOT gate merges to main. Its purpose is to anchor release artifacts
# to the Olympus ledger for public provenance. Failure here means the release
# wasn't anchored, not that the code is broken. A human should re-run it.
#
# If OLYMPUS_API_URL / OLYMPUS_API_KEY are not configured, the anchoring step
# is skipped with a notice rather than failing the workflow.

on:
  release:
    types: [published]

jobs:
  olympus-commit:
    name: Anchor release artifacts to Olympus
    runs-on: ubuntu-latest

    permissions:
      contents: write # required to update release notes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Olympus CLI
        run: pip install -e .

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          gh release download "$REF_NAME" --dir release-assets || true

      - name: Check Olympus API is configured
        id: api-check
        run: |
          if [ -z "${OLYMPUS_API_URL:-}" ] && [ -z "${OLYMPUS_API_KEY:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Olympus API not configured — skipping artifact anchoring"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          OLYMPUS_API_URL: ${{ vars.OLYMPUS_API_URL }}
          OLYMPUS_API_KEY: ${{ secrets.OLYMPUS_API_KEY }}

      - name: Commit artifacts to Olympus
        id: olympus
        if: steps.api-check.outputs.configured == 'true'
        continue-on-error: true
        env:
          OLYMPUS_API_URL: ${{ vars.OLYMPUS_API_URL }}
          OLYMPUS_API_KEY: ${{ secrets.OLYMPUS_API_KEY }}
          GH_REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          PROOF_IDS=""
          API_URL="${OLYMPUS_API_URL:-https://api.olympus.example.com}"

          for artifact in release-assets/*; do
            [ -f "$artifact" ] || continue

            PROOF_ID=$(python tools/olympus.py commit "$artifact" \
              --api-key "${OLYMPUS_API_KEY:-}" \
              --namespace github \
              --id "${GH_REPOSITORY}/${REF_NAME}" \
              --api-url "$API_URL")

            echo "Committed $artifact → proof_id=$PROOF_ID"
            PROOF_IDS="${PROOF_IDS}${PROOF_ID} "
          done

          PROOF_IDS="${PROOF_IDS% }"
          echo "proof_ids=${PROOF_IDS}" >> "$GITHUB_OUTPUT"

      - name: Warn if Olympus commitment failed
        if: steps.olympus.outcome == 'failure'
        run: echo "::warning::Olympus commitment failed — release not anchored"

      - name: Add proof IDs to release notes
        if: steps.olympus.outcome == 'success' && steps.olympus.outputs.proof_ids != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PROOF_IDS="${{ steps.olympus.outputs.proof_ids }}"
          EXISTING_NOTES=$(gh release view "$REF_NAME" --json body -q '.body // ""')

          NOTES_APPEND=$(cat <<EOF
## Olympus Provenance

Proof IDs: \`${PROOF_IDS}\`

These artifacts have been anchored to the [Olympus](https://github.com/OlympusLedgerOrg/Olympus) public ledger.
EOF
)

          printf '%s\n\n%s\n' "${EXISTING_NOTES}" "${NOTES_APPEND}" > /tmp/updated-notes.txt
          gh release edit "$REF_NAME" --notes-file /tmp/updated-notes.txt
