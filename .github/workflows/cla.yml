name: CLA and Commit Signature Enforcement

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  # -------------------------------------------------------------------------
  # CLA check — disabled. No CLA signing is required to contribute.
  # This job always passes so it does not block any PR.
  # -------------------------------------------------------------------------
  cla-check:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    steps:
      - name: CLA not required
        run: echo "No CLA signing required — all contributors are welcome."

  # -------------------------------------------------------------------------
  # Signed-commit check — advisory / informational only.
  # Reports which commits touching sensitive cryptographic paths lack a
  # GPG or SSH signature, but does NOT fail the workflow or block merging.
  # -------------------------------------------------------------------------
  signed-commit-check:
    name: Signed Commit Check (Informational)
    runs-on: ubuntu-latest
    steps:
      - name: Check signed commits for sensitive paths (advisory)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          sensitive_patterns=(
            "^protocol/"
            "^proofs/circuits/"
            "^src/"
            "^services/cdhs-smf-rust/src/"
            "^verifiers/rust/src/"
            "^verifiers/go/"
          )

          sensitive_changed=false
          sensitive_files=()

          while IFS= read -r file; do
            for pattern in "${sensitive_patterns[@]}"; do
              if echo "$file" | grep -qE "$pattern"; then
                sensitive_changed=true
                sensitive_files+=("$file")
                break
              fi
            done
          done < <(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate \
            --jq '.[].filename')

          if [ "$sensitive_changed" = "false" ]; then
            echo "No sensitive paths changed — signed commit check not required."
            exit 0
          fi

          echo "Sensitive paths changed:"
          printf '  %s\n' "${sensitive_files[@]}"
          echo ""
          echo "Checking commit signatures (advisory — does not block merge)..."
          echo ""

          UNSIGNED_COMMITS=()

          # GitHub's API returns verification.verified=true only when the
          # signature is valid AND the signing key is registered to the
          # contributor's GitHub account.
          mapfile -t commit_entries < <(
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" --paginate \
              --jq '.[] | [.sha, (.commit.verification.verified | tostring), (.author.login // "unknown")] | join("|")'
          )

          for entry in "${commit_entries[@]}"; do
            sha="${entry%%|*}"
            rest="${entry#*|}"
            verified="${rest%%|*}"
            login="${rest#*|}"

            # Skip bots: GitHub bot logins end with the [bot] suffix
            if [[ "$login" =~ \[bot\]$ ]]; then
              echo "  SKIP (bot): ${sha:0:12} — $login"
              continue
            fi

            if [ "$verified" = "true" ]; then
              echo "  OK (signed): ${sha:0:12} — $login"
            else
              echo "  ADVISORY (unsigned): ${sha:0:12} — $login"
              UNSIGNED_COMMITS+=("$sha")
            fi
          done

          if [ ${#UNSIGNED_COMMITS[@]} -gt 0 ]; then
            echo ""
            echo "ADVISORY: The following commits modify sensitive cryptographic"
            echo "paths but lack a valid GPG or SSH signature."
            echo "Signing is recommended: it cryptographically proves commit"
            echo "authorship and prevents tampering, but it is not required to merge."
            echo ""
            for c in "${UNSIGNED_COMMITS[@]}"; do
              echo "  $c"
            done
            echo ""
            echo "To sign commits, see:"
            echo "  https://docs.github.com/en/authentication/managing-commit-signature-verification"
          else
            echo ""
            echo "All commits touching sensitive paths are signed."
          fi

          # Always exit 0 — this check is informational only and must not
          # block contributors from merging their pull requests.
          exit 0

