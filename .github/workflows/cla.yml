name: CLA and Commit Signature Enforcement

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

# ---------------------------------------------------------------------------
# Sensitive paths that require GPG/SSH signed commits (CLA Section 5).
# Any PR touching these paths must have ALL commits cryptographically signed.
# ---------------------------------------------------------------------------
env:
  SENSITIVE_PATHS: |
    protocol/
    proofs/circuits/
    src/
    services/cdhs-smf-rust/src/
    verifiers/rust/src/
    verifiers/go/

jobs:
  # -------------------------------------------------------------------------
  # Job 1: CLA signature check via cla-assistant
  # Requires: cla-assistant GitHub App installed on the repo
  # -------------------------------------------------------------------------
  cla-check:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CLA_ASSISTANT_PAT: a Personal Access Token with repo write scope,
          # required for cla-assistant to commit signature records to
          # .github/cla-signatures.json on behalf of the bot.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          # Path in the repo where signed CLAs are recorded (JSON)
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'CLA.md'
          # Bot comment text when CLA is not signed.
          # Note: &gt; is used as an HTML entity so the rendered comment
          # shows the literal ">" that contributors must type when signing.
          custom-notsigned-prcomment: |
            Thank you for your contribution to Olympus!

            Before we can merge this PR, you must sign the
            <a href="https://github.com/OlympusLedgerOrg/Olympus/blob/main/CLA.md">Contributor License Agreement</a>.

            Please comment below with:
            &gt; I have read the CLA Document and I hereby sign the CLA

            This is required for all human contributors. Bots (Dependabot,
            Copilot) are exempt.
          # Bots that are exempt from CLA signing
          allowlist: |
            bot
            dependabot[bot]
            github-actions[bot]
            github-advanced-security[bot]
            copilot[bot]

  # -------------------------------------------------------------------------
  # Job 2: Signed commit enforcement for sensitive paths.
  # Uses the GitHub API — no checkout of PR code is required, so there is
  # no risk of executing untrusted code in this pull_request_target context.
  # GitHub's API verifies signatures against keys registered to each
  # contributor's account, preventing use of arbitrary signing keys.
  # if: always() ensures this check runs even when cla-check is skipped
  # (e.g. bot PRs) or fails due to infrastructure issues.
  # -------------------------------------------------------------------------
  signed-commit-check:
    name: Signed Commit Enforcement
    runs-on: ubuntu-latest
    needs: cla-check
    if: always()
    steps:
      - name: Check signed commits for sensitive paths
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          sensitive_patterns=(
            "^protocol/"
            "^proofs/circuits/"
            "^src/"
            "^services/cdhs-smf-rust/src/"
            "^verifiers/rust/src/"
            "^verifiers/go/"
          )

          sensitive_changed=false
          sensitive_files=()

          while IFS= read -r file; do
            for pattern in "${sensitive_patterns[@]}"; do
              if echo "$file" | grep -qE "$pattern"; then
                sensitive_changed=true
                sensitive_files+=("$file")
                break
              fi
            done
          done < <(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate \
            --jq '.[].filename')

          if [ "$sensitive_changed" = "false" ]; then
            echo "No sensitive paths changed — signed commit check not required."
            exit 0
          fi

          echo "Sensitive paths changed:"
          printf '  %s\n' "${sensitive_files[@]}"
          echo ""
          echo "Verifying all commits are signed..."
          echo ""

          UNSIGNED_COMMITS=()

          # GitHub's API returns verification.verified=true only when the
          # signature is valid AND the signing key is registered to the
          # contributor's GitHub account.
          mapfile -t commit_entries < <(
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" --paginate \
              --jq '.[] | [.sha, (.commit.verification.verified | tostring), (.author.login // "unknown")] | join("|")'
          )

          for entry in "${commit_entries[@]}"; do
            sha="${entry%%|*}"
            rest="${entry#*|}"
            verified="${rest%%|*}"
            login="${rest#*|}"

            # Skip bots: GitHub bot logins end with the [bot] suffix
            if [[ "$login" =~ \[bot\]$ ]]; then
              echo "  SKIP (bot): ${sha:0:12} — $login"
              continue
            fi

            if [ "$verified" = "true" ]; then
              echo "  OK (signed): ${sha:0:12} — $login"
            else
              echo "  FAIL (unsigned): ${sha:0:12} — $login"
              UNSIGNED_COMMITS+=("$sha")
            fi
          done

          if [ ${#UNSIGNED_COMMITS[@]} -gt 0 ]; then
            echo ""
            echo "ERROR: The following commits modify sensitive cryptographic"
            echo "paths but lack a valid GPG or SSH signature:"
            echo ""
            for c in "${UNSIGNED_COMMITS[@]}"; do
              echo "  $c"
            done
            echo ""
            echo "Per CLA Section 5, contributions to cryptographic components"
            echo "require signed commits. Configure git commit signing:"
            echo "  https://docs.github.com/en/authentication/managing-commit-signature-verification"
            exit 1
          fi

          echo ""
          echo "All commits touching sensitive paths are signed."

