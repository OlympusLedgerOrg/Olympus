[package]
name = "olympus-desktop"
version = "0.1.0"
edition = "2021"
description = "Olympus Ledger — native desktop shell (Tauri 2)"
license = "Apache-2.0"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }
tower-http = { version = "0.6", features = ["cors"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres"] }

[dev-dependencies]
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["time"] }

# Profile settings for member crates must live in the workspace root Cargo.toml.
# strip = true is set there via [profile.release.package.olympus-desktop].
