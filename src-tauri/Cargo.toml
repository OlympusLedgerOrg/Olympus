[package]
name = "olympus-tauri"
version = "0.1.0"
edition = "2021"
description = "Olympus desktop app — Tauri 2 shell with embedded Axum API"
license = "Apache-2.0"
rust-version = "1.77"

[lib]
name = "olympus_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "olympus-tauri"
path = "src/main.rs"

# Setup-time tool: convert snarkjs `.zkey` to arkworks-serialized `.ark.zkey`.
# Runtime never invokes this; it's called by proofs/setup_circuits.sh after
# snarkjs generates the proving key. Keeps the runtime binary free of any
# Node.js dependency while still using snarkjs for trusted-setup ceremony.
[[bin]]
name = "export_ark_zkey"
path = "src/bin/export_ark_zkey.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-notification = "2"

# HTTP server (replaces Python FastAPI — Phase 2)
axum = { version = "0.8", features = ["macros"] }
tower-http = { version = "0.6", features = ["cors", "trace", "compression-gzip"] }
tokio = { version = "1", features = ["full"] }

# Database — sqlx always on; pg_embed only in the embedded-db feature
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio-rustls", "uuid", "chrono", "migrate"] }
pg-embed = { version = "0.7", default-features = false, features = ["rt_tokio_migrate"], optional = true }

# Serialisation
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Crypto — re-linked from olympus_core crate (no PyO3 in this context)
olympus-crypto = { path = "../crates/olympus-crypto" }
blake3 = "1"
ed25519-dalek = "2.2.0"

# ZK proof layer — Groth16 on BN254 matching snarkjs/circomlib output.
# Pinned to arkworks 0.4 (the family `light-poseidon = "0.3"` and
# `ark-circom = "0.6"` target). arkworks 0.5/0.6 redefined `PrimeField`'s
# associated-type bounds, which `light-poseidon 0.3` cannot satisfy — bumping
# arks forward would require either a new Poseidon crate or a fork of
# light-poseidon. Keeping the whole stack at 0.4 is the cheapest coherent pin.
ark-bn254 = "=0.5.0"
ark-groth16 = { version = "=0.5.0", features = ["r1cs"] }
ark-ff = "=0.5.0"
ark-ec = "=0.5.0"
ark-serialize = "=0.5.0"
ark-relations = "=0.5.1"
ark-snark = "=0.5.1"
# Poseidon with BN254 parameters matching circomlib (iden3 spec)
light-poseidon = "0.3"
num-bigint = "0.4"

# Native witness generation: parse circom .wasm in-process (via wasmer),
# parse snarkjs .zkey natively, prove via ark-groth16.
#
# Version pin: ark-circom 0.6 targets arkworks 0.6, but light-poseidon 0.3
# pins ark-ff 0.5 — Cargo can't pick a single arkworks version that
# satisfies both, and a two-version graph fails the `PrimeField` trait bound.
# ark-circom 0.5 is the latest release targeting arkworks 0.5.
#
# Defaults enabled to pull in `wasmer/default` (provides the wasm backend
# `sys` feature) and `wasmer-wasix/default`. This also pulls `ethers-core`
# via the `ethereum` feature — undesirable but the smallest patch; a future
# round can split out a custom feature set if the binary size matters.
ark-circom = "=0.5"
rand = "0.8"
# ark-circom's error types use `color_eyre::Report` in their public API,
# so consumers transitively need to name the type.
color-eyre = "0.6"

# Rate limiting (token-bucket, replaces slowapi)
governor = { version = "0.6", features = ["std", "dashmap"] }

# Error handling & logging
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
num_cpus = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
regex = "1"
once_cell = "1"
hex = "0.4"

[features]
default = ["custom-protocol", "embedded-db"]
custom-protocol = ["tauri/custom-protocol"]
embedded-db = ["pg-embed"]

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
opt-level = 3
strip = true

[profile.dev]
opt-level = 1
