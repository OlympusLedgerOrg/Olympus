[tool.ruff]
# Adjust to your supported runtime(s)
target-version = "py310"
line-length = 100
respect-gitignore = true

[tool.ruff.lint]
select = [
  "E",  # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",  # pyflakes
  "I",  # isort (import sorting)
  "UP", # pyupgrade
]
ignore = [
  "E501",  # allow lines longer than 100 chars for now
]
fixable = ["E", "W", "F", "I", "UP"]
unfixable = []

[tool.ruff.lint.isort]
# Ensure first-party modules are grouped correctly after stdlib and third-party.
known-first-party = ["app", "api", "protocol", "storage", "tests"]
combine-as-imports = true
force-single-line = false
lines-after-imports = 2

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
