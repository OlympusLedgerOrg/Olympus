# Olympus local production package.
#
# This Compose file is intentionally localhost-first and cross-platform for
# Docker Desktop on Windows and macOS. It starts the durable production-shaped
# stack without Traefik/ACME/domain requirements:
#
#   UI  -> http://localhost:8080
#   API -> http://localhost:8001
#
# First-boot helpers:
#   Windows: double-click Olympus-Install-Windows.cmd
#   macOS:   double-click Olympus-Install-macOS.command

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

secrets:
  db_password:
    file: ./secrets/db_password

services:
  db:
    image: postgres:16
    container_name: olympus-package-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olympus}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-olympus}
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olympus} -d ${POSTGRES_DB:-olympus}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  cdhs-smf-rust:
    build:
      context: .
      dockerfile: services/cdhs-smf-rust/Dockerfile
    container_name: olympus-package-cdhs-smf-rust
    user: "0:0"
    volumes:
      - olympus_package_socket:/run/olympus
    environment:
      CDHS_SMF_SOCKET: /run/olympus/cdhs-smf.sock
      CDHS_SMF_UNLINK_STALE_SOCKET: "1"
      SEQUENCER_SMT_SIGNING_KEY: ${OLYMPUS_SEQUENCER_SIGNING_KEY:-${OLYMPUS_INGEST_SIGNING_KEY}}
      RUST_LOG: ${RUST_LOG:-info}
    networks:
      - backend
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true

  sequencer-go:
    build:
      context: services/sequencer-go
      dockerfile: Dockerfile
    container_name: olympus-package-sequencer-go
    user: "65532:0"
    depends_on:
      cdhs-smf-rust:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      CDHS_SMF_SOCKET: /run/olympus/cdhs-smf.sock
      SEQUENCER_DB_HOST: db
      SEQUENCER_DB_PORT: "5432"
      SEQUENCER_DB_USER: ${POSTGRES_USER:-olympus}
      SEQUENCER_DB_NAME: ${POSTGRES_DB:-olympus}
      SEQUENCER_DB_SSLMODE: ${SEQUENCER_DB_SSLMODE:-disable}
      SEQUENCER_ALLOW_INSECURE_DB: ${SEQUENCER_ALLOW_INSECURE_DB:-1}
      SEQUENCER_DB_PASSWORD_FILE: /run/secrets/db_password
      OLYMPUS_SEQUENCER_TOKEN: ${OLYMPUS_SEQUENCER_TOKEN}
      SEQUENCER_HTTP_ADDR: ":8081"
      OLYMPUS_SEQUENCER_MAX_BATCH_SIZE: ${OLYMPUS_SEQUENCER_MAX_BATCH_SIZE:-1000}
      OLYMPUS_SEQUENCER_STORAGE_COMMIT_TIMEOUT: ${OLYMPUS_SEQUENCER_STORAGE_COMMIT_TIMEOUT:-25s}
    secrets:
      - db_password
    volumes:
      - olympus_package_socket:/run/olympus
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/sequencer", "--healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    read_only: true
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      target: production
    container_name: olympus-package-api
    env_file:
      - .env
    command: ["/bin/sh", "/app/scripts/startup.sh"]
    environment:
      # Local Docker Desktop package: Postgres is private on the Compose
      # backend network, so it runs without certificate-verifying TLS.
      # Public deployments should use docker-compose.yml with a real domain
      # and a DATABASE_URL that sets sslmode=verify-full or verify-ca.
      OLYMPUS_ENV: development
      OLYMPUS_DEV_SIGNING_KEY: "false"
      OLYMPUS_ALLOW_PUBLIC_WRITE_REGISTRATION: ${OLYMPUS_ALLOW_PUBLIC_WRITE_REGISTRATION:-1}
      # Override any DATABASE_URL from .env — the startup script uses this
      # to determine which host:port to wait on, so it must point at the
      # Docker Compose db service, not the host-side 127.0.0.1:5433.
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-olympus}@db:5432/${POSTGRES_DB:-olympus}"
      PSYCOPG_URL: "postgresql://${POSTGRES_USER:-olympus}@db:5432/${POSTGRES_DB:-olympus}"
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER:-olympus}
      DATABASE_NAME: ${POSTGRES_DB:-olympus}
      DATABASE_PASSWORD_FILE: /run/secrets/db_password
      OLYMPUS_USE_GO_SEQUENCER: ${OLYMPUS_USE_GO_SEQUENCER:-true}
      OLYMPUS_SEQUENCER_URL: "http://sequencer-go:8081"
      GO_SEQUENCER_URL: "http://sequencer-go:8081"
      OLYMPUS_SEQUENCER_TOKEN: ${OLYMPUS_SEQUENCER_TOKEN}
      OLYMPUS_SEQUENCER_TIMEOUT_SECONDS: ${OLYMPUS_SEQUENCER_TIMEOUT_SECONDS:-30}
      CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
      sequencer-go:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5
    networks:
      - frontend
      - backend
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run

  # RFC 3161 timestamp background worker.
  # POST /datasets/commit returns timestamp_status="pending" immediately;
  # this worker fetches the TSA token and persists it. Without it, timestamps
  # never advance from "pending". Required sidecar — do not remove.
  tsa-worker:
    build:
      context: .
      target: production
    container_name: olympus-package-tsa-worker
    env_file:
      - .env
    command: ["python", "-m", "api.workers.tsa_worker"]
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-olympus}@db:5432/${POSTGRES_DB:-olympus}"
      PSYCOPG_URL: "postgresql://${POSTGRES_USER:-olympus}@db:5432/${POSTGRES_DB:-olympus}"
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER:-olympus}
      DATABASE_NAME: ${POSTGRES_DB:-olympus}
      DATABASE_PASSWORD_FILE: /run/secrets/db_password
      TSA_GRACE_SECONDS: ${TSA_GRACE_SECONDS:-300}
      TSA_URL: ${TSA_URL:-http://timestamp.digicert.com}
      OLYMPUS_LOG_FORMAT: ${OLYMPUS_LOG_FORMAT:-json}
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - backend
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  public-ui:
    build:
      context: app/public-ui
      dockerfile: Dockerfile
    container_name: olympus-package-public-ui
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
      - /var/cache/nginx:rw,noexec,nosuid,size=32m,mode=1777

volumes:
  olympus_package_socket:
  # olympus_package_pgdata removed — now a bind mount (./data/pgdata)
