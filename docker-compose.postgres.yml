# Live PostgreSQL service for local development and postgres-marked tests.
#
# Usage:
#   docker compose -f docker-compose.postgres.yml up -d
#
# Connection strings:
#   DATABASE_URL=postgresql://olympus:olympus@localhost:5432/olympus
#   TEST_DATABASE_URL=postgresql://olympus:olympus@localhost:5432/olympus
#
# This file intentionally uses simple local credentials so tests/conftest.py can
# auto-detect the database. The main docker-compose.yml keeps secret-backed
# credentials for full-stack deployments.

services:
  postgres:
    image: postgres:16
    container_name: olympus-live-postgres
    environment:
      POSTGRES_USER: olympus
      POSTGRES_PASSWORD: olympus
      POSTGRES_DB: olympus
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olympus -d olympus"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - olympus_live_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  olympus_live_pgdata:
