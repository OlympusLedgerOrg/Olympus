[profile.default]
fail-fast = false
retries = 0
slow-timeout = { period = "60s", terminate-after = 4 }
test-threads = 4

[[profile.default.overrides]]
filter = 'binary(api_db)'
test-group = 'api-db'

[profile.ci]
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "fail"
final-status-level = "slow"
test-threads = 4

[[profile.ci.overrides]]
filter = 'binary(api_db)'
test-group = 'api-db'

[test-groups]
api-db = { max-threads = 1 }
