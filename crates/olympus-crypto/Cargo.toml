[package]
name = "olympus-crypto"
version = "0.1.0"
edition = "2021"
description = "Shared Olympus protocol crypto primitives"
license = "Apache-2.0"

[features]
# Pull in BN254 Poseidon for ZK-circuit commitment computation (e.g. redaction).
poseidon = ["dep:ark-bn254", "dep:ark-ff", "dep:num-bigint"]

[dependencies]
blake3 = "1"
hex = "0.4"
thiserror = "1"

# Optional heavy deps — only compiled when the `poseidon` feature is enabled.
# Pinned to match the workspace root Cargo.toml ark versions.
ark-bn254    = { version = "=0.6.0", optional = true }
ark-ff       = { version = "=0.6.0", optional = true }
num-bigint   = { version = "0.4",    optional = true }
