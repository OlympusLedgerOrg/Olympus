# nginx config for the Olympus public verification UI.
#
# Designed to run with a read-only root filesystem. Every path nginx writes
# to (pid file, temp dirs, caches) lives under /tmp, which the operator
# mounts as tmpfs. The listen port is 8080 so the container does not need
# CAP_NET_BIND_SERVICE.

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  30s;
    server_tokens      off;

    # All write paths under /tmp so the root fs can stay read-only.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    # Compression — text-only, never images.
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Reasonable upload cap — the UI never POSTs large bodies, but reject
    # outsized requests early instead of letting them sit on the wire.
    client_max_body_size 1m;

    log_format access '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time';

    access_log /dev/stdout access;
    error_log  /dev/stderr warn;

    # ----------------------------------------------------------------------
    # Upstream — the Olympus API gateway.
    # ----------------------------------------------------------------------
    # Inside docker-compose the hostname `app` resolves to the FastAPI
    # container on the shared `frontend` network. Operators deploying
    # outside compose should mount their own nginx.conf with the correct
    # upstream (or use the `/etc/nginx/templates` envsubst support).
    upstream olympus_api {
        server app:8000;
        keepalive 16;
    }

    server {
        listen      8080 default_server;
        listen      [::]:8080 default_server;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Security headers. CSP is intentionally conservative — the SPA
        # never loads remote scripts or styles in production. If you embed
        # third-party widgets you'll need to widen these directives.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=(), microphone=(), camera=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Liveness — never hits the API.
        location = /healthz {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # Long-cache hashed asset bundles. Vite emits content-hashed
        # filenames, so these are safe to cache for a year.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # API proxy — forward verify/dataset/proof traffic to the Olympus
        # gateway. The dev vite proxy already does this for `npm run dev`;
        # the prod nginx container needs a matching server-side reverse proxy.
        location ~ ^/(ingest|datasets|v1)/ {
            proxy_pass         http://olympus_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
            # Don't let the proxy buffer the entire response body in memory
            # for streaming verify endpoints.
            proxy_buffering    off;
        }

        # SPA fallback — every unmatched route goes to index.html so React
        # Router handles client-side routing. index.html is short-cache so
        # users pick up new builds quickly.
        location / {
            add_header Cache-Control "no-cache, must-revalidate" always;
            try_files $uri $uri/ /index.html;
        }
    }
}
